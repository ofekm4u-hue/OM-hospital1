<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b3d5c">
<title>OM Hospital — סימולטור מיון</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Assistant:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ===================== Design tokens ===================== */
  :root{
    --navy:        #0b3d5c;   /* OM Hospital primary */
    --navy-dark:   #082d44;
    --navy-light:  #14567d;
    --teal:        #0f9b8e;
    --teal-dark:   #0b7a70;
    --red:         #c01a2b;   /* alerts / critical */
    --red-dark:    #9a1422;
    --red-bg:      #fdeaec;
    --amber:       #d68a0c;
    --amber-bg:    #fcf2dc;
    --green:       #2e8b57;
    --green-bg:    #e4f3ea;
    --gray-bg:     #f3f5f8;
    --card-bg:     #ffffff;
    --border:      #dde3ea;
    --border-soft: #eef1f5;
    --text:        #1b2430;
    --text-soft:   #5a6675;
    --text-faint:  #8b97a6;
    --shadow-sm:   0 1px 3px rgba(11,61,92,.08);
    --shadow-md:   0 6px 18px rgba(11,61,92,.12);
    --shadow-lg:   0 16px 44px rgba(11,61,92,.20);
    --r-sm: 7px; --r-md: 12px; --r-lg: 18px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Heebo','Assistant',system-ui,sans-serif;
    background:var(--gray-bg);
    color:var(--text);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;}
  input,select,textarea{font-family:inherit;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:#c7d0db;border-radius:8px;}

  /* ===================== Buttons ===================== */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:7px;
    background:var(--navy);color:#fff;border:1px solid var(--navy);
    padding:10px 18px;border-radius:var(--r-sm);font-size:.92rem;font-weight:600;
    cursor:pointer;transition:.15s;white-space:nowrap;text-decoration:none;
  }
  .btn:hover{background:var(--navy-dark);border-color:var(--navy-dark);}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .btn.teal{background:var(--teal);border-color:var(--teal);}
  .btn.teal:hover{background:var(--teal-dark);border-color:var(--teal-dark);}
  .btn.green{background:var(--green);border-color:var(--green);}
  .btn.red{background:var(--red);border-color:var(--red);}
  .btn.red:hover{background:var(--red-dark);border-color:var(--red-dark);}
  .btn.ghost{background:transparent;color:var(--navy);border-color:var(--border);}
  .btn.ghost:hover{background:var(--border-soft);}
  .btn.sm{padding:6px 12px;font-size:.82rem;}
  .btn.block{width:100%;}

  /* ===================== Form controls ===================== */
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:.85rem;font-weight:600;color:var(--text-soft);margin-bottom:5px;}
  .field label .req{color:var(--red);}
  .ctrl{
    width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--r-sm);
    font-size:.94rem;background:#fff;color:var(--text);transition:.15s;
  }
  .ctrl:focus{outline:none;border-color:var(--navy-light);box-shadow:0 0 0 3px rgba(20,86,125,.12);}
  textarea.ctrl{resize:vertical;min-height:80px;line-height:1.55;}
  .ctrl.invalid{border-color:var(--red);box-shadow:0 0 0 3px rgba(192,26,43,.12);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 16px;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 16px;}
  @media(max-width:640px){.grid2,.grid3{grid-template-columns:1fr;}}
  .hint{font-size:.78rem;color:var(--text-faint);margin-top:4px;}

  /* ===================== Badges ===================== */
  .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:.78rem;font-weight:700;white-space:nowrap;}
  .badge.red{background:var(--red-bg);color:var(--red-dark);}
  .badge.amber{background:var(--amber-bg);color:var(--amber);}
  .badge.green{background:var(--green-bg);color:var(--green);}
  .badge.navy{background:#e6eef4;color:var(--navy);}
  .badge.gray{background:#eceff3;color:var(--text-soft);}
  .badge.teal{background:#dbf3f0;color:var(--teal-dark);}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
  .dot.red{background:var(--red);} .dot.amber{background:var(--amber);} .dot.green{background:var(--green);}

  /* ===================== Cards ===================== */
  .panel{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--r-md);box-shadow:var(--shadow-sm);}
  .panel-pad{padding:18px 20px;}
  .section-title{font-size:1.02rem;font-weight:800;color:var(--navy-dark);margin:0 0 12px;display:flex;align-items:center;gap:8px;}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:20px;}
  .stat{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--r-md);padding:15px 17px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;}
  .stat::before{content:"";position:absolute;inset-inline-start:0;top:0;bottom:0;width:5px;background:var(--navy);}
  .stat.red::before{background:var(--red);} .stat.amber::before{background:var(--amber);}
  .stat.green::before{background:var(--green);} .stat.teal::before{background:var(--teal);}
  .stat .label{font-size:.82rem;color:var(--text-soft);font-weight:600;margin-bottom:6px;}
  .stat .value{font-size:1.7rem;font-weight:800;color:var(--navy-dark);line-height:1.1;}

  /* ===================== Tables ===================== */
  .tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--r-md);background:#fff;}
  table.tbl{width:100%;border-collapse:collapse;font-size:.9rem;min-width:680px;}
  table.tbl th{background:#eef2f6;color:var(--text-soft);font-weight:700;text-align:right;padding:11px 14px;font-size:.8rem;border-bottom:1px solid var(--border);white-space:nowrap;}
  table.tbl td{padding:11px 14px;border-bottom:1px solid var(--border-soft);vertical-align:middle;}
  table.tbl tr:last-child td{border-bottom:none;}
  table.tbl tr.clickable{cursor:pointer;transition:.12s;}
  table.tbl tr.clickable:hover{background:#f5f9fc;}
  table.tbl td.empty{text-align:center;color:var(--text-faint);padding:34px;font-size:.92rem;}
  .acuity-cell{border-inline-start:5px solid transparent;font-weight:700;}
  .acuity-cell.red{border-inline-start-color:var(--red);}
  .acuity-cell.amber{border-inline-start-color:var(--amber);}
  .acuity-cell.green{border-inline-start-color:var(--green);}

  /* ===================== Login ===================== */
  #loginView{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
    background:radial-gradient(1200px 600px at 80% -10%,rgba(15,155,142,.18),transparent),
               linear-gradient(160deg,var(--navy-dark),var(--navy) 60%,var(--navy-light));}
  .login-card{width:100%;max-width:430px;background:#fff;border-radius:var(--r-lg);box-shadow:var(--shadow-lg);overflow:hidden;}
  .login-head{background:linear-gradient(135deg,var(--navy),var(--navy-light));color:#fff;padding:30px 30px 26px;text-align:center;}
  .login-body{padding:26px 30px 30px;}
  .login-foot{padding:0 30px 24px;font-size:.78rem;color:var(--text-faint);text-align:center;}

  /* OM logo emblem */
  .logo{display:inline-flex;align-items:center;gap:11px;}
  .logo .mark{width:46px;height:46px;border-radius:11px;background:#fff;position:relative;flex:0 0 auto;box-shadow:inset 0 0 0 3px rgba(192,26,43,.12);}
  .logo .mark::before,.logo .mark::after{content:"";position:absolute;background:var(--red);border-radius:2px;}
  .logo .mark::before{width:46%;height:14%;top:43%;inset-inline-start:27%;}
  .logo .mark::after{width:14%;height:46%;top:27%;inset-inline-start:43%;}
  .logo .ltxt{line-height:1.1;text-align:start;}
  .logo .ltxt b{font-size:1.18rem;font-weight:900;letter-spacing:.3px;display:block;}
  .logo .ltxt span{font-size:.74rem;opacity:.85;font-weight:500;}

  /* ===================== App shell ===================== */
  #appView{display:none;}
  header.app-header{background:linear-gradient(120deg,var(--navy-dark),var(--navy));color:#fff;
    padding:11px 22px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow-md);position:sticky;top:0;z-index:50;}
  .app-header .logo .mark{width:38px;height:38px;}
  .app-header .grow{flex:1;min-width:0;}
  .who{display:flex;align-items:center;gap:10px;font-size:.84rem;}
  .who .uname{font-weight:700;}
  .who .urole{opacity:.82;font-size:.76rem;}
  .who .avatar{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.92rem;}
  .icon-btn{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.28);
    width:34px;height:34px;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:1rem;transition:.15s;}
  .icon-btn:hover{background:rgba(255,255,255,.24);}

  nav.tabs{display:flex;flex-wrap:wrap;gap:2px;background:var(--navy-light);padding:0 12px;box-shadow:var(--shadow-sm);
    position:sticky;top:60px;z-index:40;}
  nav.tabs button{background:transparent;border:none;color:rgba(255,255,255,.82);font-size:.92rem;font-weight:600;
    padding:13px 16px;cursor:pointer;border-bottom:3px solid transparent;transition:.15s;display:inline-flex;align-items:center;gap:7px;}
  nav.tabs button:hover{color:#fff;background:rgba(255,255,255,.08);}
  nav.tabs button.active{color:#fff;background:rgba(255,255,255,.14);border-bottom-color:#fff;}
  nav.tabs button.hidden{display:none;}

  main{max-width:1280px;margin:0 auto;padding:22px 20px 80px;}
  .view{display:none;animation:fade .22s ease;}
  .view.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap;}
  .page-head h2{font-size:1.5rem;font-weight:800;margin:0 0 2px;color:var(--navy-dark);}
  .page-head p{margin:0;color:var(--text-soft);font-size:.9rem;}
  .toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:16px;}
  .toolbar .spacer{flex:1;}
  .search{position:relative;}
  .search input{padding-inline-start:34px;min-width:230px;}
  .search::before{content:"🔍";position:absolute;inset-inline-start:11px;top:50%;transform:translateY(-50%);font-size:.85rem;opacity:.6;}

  /* ===================== Patient record ===================== */
  .pt-head{display:flex;align-items:center;gap:16px;flex-wrap:wrap;background:#fff;border:1px solid var(--border);
    border-radius:var(--r-md);padding:16px 20px;box-shadow:var(--shadow-sm);margin-bottom:8px;}
  .pt-head .pt-name{font-size:1.35rem;font-weight:800;color:var(--navy-dark);}
  .pt-head .pt-meta{font-size:.86rem;color:var(--text-soft);display:flex;flex-wrap:wrap;gap:4px 16px;margin-top:3px;}
  .pt-head .grow{flex:1;}
  .allergy-banner{background:var(--red-bg);border:1px solid var(--red);color:var(--red-dark);border-radius:var(--r-sm);
    padding:10px 14px;font-weight:700;display:flex;align-items:center;gap:9px;margin:10px 0 0;font-size:.92rem;}
  .allergy-banner.none{background:var(--green-bg);border-color:var(--green);color:var(--green);font-weight:600;}

  .rec-tabs{display:flex;flex-wrap:wrap;gap:4px;margin:16px 0 14px;border-bottom:2px solid var(--border);}
  .rec-tabs button{background:transparent;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;
    padding:11px 16px;font-size:.92rem;font-weight:600;color:var(--text-soft);cursor:pointer;transition:.15s;}
  .rec-tabs button:hover{color:var(--navy);}
  .rec-tabs button.active{color:var(--navy-dark);border-bottom-color:var(--navy);}
  .rec-tabs button.hidden{display:none;}
  .rec-panel{display:none;} .rec-panel.active{display:block;}

  .vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;}
  .vital{background:#f7f9fb;border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;}
  .vital label{font-size:.78rem;color:var(--text-soft);font-weight:600;}
  .vital input{margin-top:5px;}
  .vital.abn input{border-color:var(--red);}

  .order-group{border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;margin-bottom:12px;}
  .order-group h4{margin:0 0 10px;font-size:.92rem;color:var(--navy-dark);}
  .chk{display:flex;flex-wrap:wrap;gap:8px;}
  .chk label{display:inline-flex;align-items:center;gap:6px;background:#f3f6f9;border:1px solid var(--border);
    border-radius:999px;padding:6px 13px;font-size:.85rem;cursor:pointer;transition:.12s;user-select:none;}
  .chk label:hover{background:#e9eff4;}
  .chk input{accent-color:var(--navy);}
  .chk label.checked{background:#e0edf5;border-color:var(--navy-light);color:var(--navy-dark);font-weight:600;}

  .result-row{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px dashed var(--border-soft);font-size:.9rem;}
  .result-row:last-child{border-bottom:none;}
  .result-row .rv{font-weight:700;font-variant-numeric:tabular-nums;}
  .result-row .rv.high{color:var(--red);} .result-row .rv.low{color:var(--amber);}
  .result-row .flag{font-size:.72rem;font-weight:800;}
  .flag.H{color:var(--red);} .flag.L{color:var(--amber);}
  .radiology-report{background:#f7f9fb;border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;
    font-size:.9rem;line-height:1.6;white-space:pre-wrap;}

  .med-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:#f7f9fb;border:1px solid var(--border);
    border-radius:var(--r-sm);padding:10px 12px;margin-bottom:8px;}
  .med-row .mname{font-weight:700;color:var(--navy-dark);}
  .med-row .grow{flex:1;}

  .timeline{list-style:none;margin:0;padding:0;}
  .timeline li{position:relative;padding:0 22px 14px 0;border-inline-end:2px solid var(--border);margin-inline-end:6px;}
  .timeline li::before{content:"";position:absolute;inset-inline-end:-6px;top:3px;width:10px;height:10px;border-radius:50%;background:var(--navy);}
  .timeline li .tl-time{font-size:.76rem;color:var(--text-faint);}
  .timeline li .tl-txt{font-size:.9rem;}

  /* ===================== Modal ===================== */
  .overlay{position:fixed;inset:0;background:rgba(11,30,46,.55);backdrop-filter:blur(2px);display:none;
    align-items:center;justify-content:center;z-index:100;padding:18px;}
  .overlay.open{display:flex;}
  .modal{background:#fff;border-radius:var(--r-lg);box-shadow:var(--shadow-lg);width:100%;max-width:560px;max-height:90vh;
    overflow:auto;animation:pop .2s ease;}
  .modal.wide{max-width:760px;}
  @keyframes pop{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:none;}}
  .modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .modal-head h3{margin:0;font-size:1.15rem;font-weight:800;color:var(--navy-dark);}
  .modal-body{padding:20px 22px;}
  .modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}
  .x{background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--text-faint);line-height:1;}

  /* ===================== Toast ===================== */
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(40px);opacity:0;
    background:var(--navy-dark);color:#fff;padding:12px 22px;border-radius:999px;font-size:.9rem;font-weight:600;
    box-shadow:var(--shadow-lg);z-index:200;transition:.3s;pointer-events:none;max-width:90vw;}
  #toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
  #toast.err{background:var(--red-dark);}
  #toast.ok{background:var(--green);}

  /* ===================== Discharge document ===================== */
  #docView .doc-toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
  .doc-sheet{background:#fff;max-width:820px;margin:0 auto;border:1px solid var(--border);box-shadow:var(--shadow-md);
    padding:40px 46px;font-size:.92rem;line-height:1.6;color:#16202b;}
  .doc-sheet .doc-top{text-align:center;border-bottom:3px double var(--navy);padding-bottom:14px;margin-bottom:10px;}
  .doc-sheet .doc-top .h-name{font-size:1.5rem;font-weight:900;color:var(--navy-dark);letter-spacing:.5px;}
  .doc-sheet .doc-top .h-en{font-size:.95rem;color:var(--text-soft);letter-spacing:2px;}
  .doc-sheet .doc-top .h-addr{font-size:.82rem;color:var(--text-soft);margin-top:3px;}
  .doc-meta{display:flex;flex-wrap:wrap;justify-content:space-between;gap:4px 20px;font-size:.85rem;
    background:#f5f8fa;border:1px solid var(--border);border-radius:6px;padding:10px 14px;margin-bottom:16px;}
  .doc-sec{margin-bottom:15px;}
  .doc-sec h3{font-size:.98rem;font-weight:800;color:#fff;background:var(--navy);padding:5px 12px;border-radius:5px;margin:0 0 9px;}
  .doc-sec .en{font-weight:500;opacity:.8;font-size:.8rem;}
  .doc-row{display:flex;flex-wrap:wrap;gap:3px 24px;margin-bottom:5px;}
  .doc-row b{font-weight:700;}
  .doc-pre{white-space:pre-wrap;}
  .doc-allergy{color:var(--red);font-weight:800;}
  .doc-warn{background:var(--red-bg);border:1px solid var(--red);border-radius:6px;padding:10px 13px;color:var(--red-dark);font-weight:600;}
  .doc-sign{display:flex;justify-content:space-between;align-items:flex-end;margin-top:34px;gap:20px;}
  .doc-sign .sig-line{border-top:1px solid #333;padding-top:5px;text-align:center;min-width:200px;font-size:.82rem;color:var(--text-soft);}
  .doc-footer{text-align:center;border-top:3px double var(--navy);margin-top:24px;padding-top:10px;font-size:.78rem;color:var(--text-faint);}

  .muted{color:var(--text-faint);}
  .nowrap{white-space:nowrap;}
  .pill-route{font-size:.7rem;background:#e6eef4;color:var(--navy);padding:2px 7px;border-radius:5px;font-weight:700;}

  /* ===================== Training / Case simulator ===================== */
  .sim-hero{background:linear-gradient(135deg,var(--navy),var(--teal-dark));color:#fff;border-radius:var(--r-lg);
    padding:26px 28px;box-shadow:var(--shadow-md);display:flex;align-items:center;gap:22px;flex-wrap:wrap;margin-bottom:18px;}
  .sim-hero .grow{flex:1;min-width:220px;}
  .sim-hero h2{margin:0 0 6px;font-size:1.6rem;font-weight:900;}
  .sim-hero p{margin:0;opacity:.9;font-size:.95rem;}
  .sim-score{display:flex;gap:18px;flex-wrap:wrap;}
  .sim-score .s{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.25);border-radius:var(--r-md);padding:10px 16px;text-align:center;min-width:90px;}
  .sim-score .s .v{font-size:1.5rem;font-weight:900;line-height:1;}
  .sim-score .s .l{font-size:.72rem;opacity:.85;margin-top:3px;}
  .sim-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:16px;align-items:start;}
  @media(max-width:880px){.sim-grid{grid-template-columns:1fr;}}
  .sim-actions{position:sticky;top:112px;}
  .dispo-btn{display:flex;align-items:center;gap:10px;width:100%;text-align:start;border:1px solid var(--border);
    background:#fff;border-radius:var(--r-sm);padding:12px 14px;margin-bottom:8px;cursor:pointer;font-size:.95rem;font-weight:600;color:var(--text);transition:.13s;font-family:inherit;}
  .dispo-btn:hover{border-color:var(--navy-light);background:#f5f9fc;transform:translateY(-1px);}
  .dispo-btn .ic{font-size:1.3rem;}
  .dispo-btn.or{border-inline-start:5px solid var(--red);}
  .dispo-btn.adm{border-inline-start:5px solid var(--navy);}
  .dispo-btn.dc{border-inline-start:5px solid var(--green);}
  .dispo-btn:disabled{opacity:.55;cursor:not-allowed;transform:none;}

  .chat{display:flex;flex-direction:column;gap:9px;max-height:300px;overflow-y:auto;padding:6px 2px;margin-bottom:10px;}
  .bubble{max-width:85%;padding:9px 13px;border-radius:14px;font-size:.9rem;line-height:1.45;}
  .bubble.q{align-self:flex-start;background:var(--navy);color:#fff;border-bottom-inline-start-radius:4px;}
  .bubble.a{align-self:flex-end;background:#eef2f6;color:var(--text);border-bottom-inline-end-radius:4px;}
  .chat-empty{color:var(--text-faint);font-size:.86rem;text-align:center;padding:20px;}
  .q-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}

/* -------------------- Triage acuity -------------------- */
function computeAcuity(v){
  // returns {color:'red'|'amber'|'green', esi:1-5}
  if(!v) return {color:"green", esi:5};
  const sys = +(String(v.bp||"").split("/")[0])||0;
  const pulse=+v.pulse||0, temp=+v.temp||0, spo2=+v.spo2||100, pain=+v.pain||0;
  let red=false, amber=false;
  if(spo2 && spo2<90) red=true;
  if(sys && (sys<90 || sys>220)) red=true;
  if(pulse && (pulse<40 || pulse>130)) red=true;
  if(temp && temp>=39.5) red=true;
  if(pain>=8) red=true;
  if(!red){
    if(spo2 && spo2<94) amber=true;
    if(sys && (sys<100 || sys>180)) amber=true;
    if(pulse && (pulse<50 || pulse>110)) amber=true;
    if(temp && temp>=38) amber=true;
    if(pain>=5) amber=true;
  }
  if(red) return {color:"red", esi: spo2<88||sys<80?1:2};
  if(amber) return {color:"amber", esi:3};
  return {color:"green", esi: pain>=2?4:5};
}

/* -------------------- Allergy check -------------------- */
function patientAllergyKeys(patient){
  const txt = (patient.allergies||[]).join(" ").toLowerCase();
  return txt;
}
function drugBlockedByAllergy(patient, drugName){
  if(!patient || !(patient.allergies&&patient.allergies.length)) return null;
  const allergyTxt = patientAllergyKeys(patient);
  const drug = FORMULARY.find(d=>d.name===drugName);
  if(!drug) return null;
  for(const key of drug.allergy){
    if(allergyTxt.includes(key.toLowerCase())) return key;
  }
  // also direct name match
  if(allergyTxt.includes((drugName||"").toLowerCase().slice(0,4))) return drugName;
  return null;
}

});

function finishLogin(user, dept){
  session = { ...user, sessionDept: dept };
  try{ sessionStorage.setItem("om_session", JSON.stringify(session)); }catch(e){}
  audit("התחברות למערכת", `${user.name} (${ROLE_HE[user.role]})`); saveState();
  enterApp();
}

function enterApp(){
  $("loginView").style.display="none";
  $("appView").style.display="block";
  $("hdrName").textContent = session.name;
  $("hdrRole").textContent = ROLE_HE[session.role] + (session.admin? " · מנהל":"");
  $("hdrAvatar").textContent = initials(session.name) || "👤";
  $("hdrDept").textContent = session.sessionDept || session.department || "רפואה דחופה";
  applyPermsToNav();
  navigate("dashboard");
}

function logout(){
  audit("התנתקות","");
  saveState();
  session=null; pendingLogin=null;
  try{ sessionStorage.removeItem("om_session"); }catch(e){}
  $("appView").style.display="none";
  $("loginView").style.display="flex";
  $("loginForm").reset(); $("otpForm").reset();
  $("otpForm").style.display="none"; $("loginForm").style.display="block";
  $("li_err").style.display="none"; $("otp_err").style.display="none";
}

function applyPermsToNav(){
  document.querySelectorAll("#tabsNav button").forEach(b=>{
    const perm=b.dataset.perm;
    b.classList.toggle("hidden", perm? !can(perm) : false);
  });
}

/* ==================================================================

   ================================================================== */
let currentView="dashboard", currentEncounterId=null, currentRecTab="anamnesis";

function navigate(view, opts){
  opts=opts||{};
  if(view==="record"){ currentEncounterId=opts.encId; }
  currentView=view;
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  const map = { dashboard:"dashboardView", admit:"admitView", record:"recordView", beds:"bedsView",
    archive:"archiveView", users:"usersView", audit:"auditView", train:"trainView", document:"docView" };
  const el = $(map[view]); if(el) el.classList.add("active");
  document.querySelectorAll("#tabsNav button").forEach(b=>b.classList.toggle("active", b.dataset.view===view));
  window.scrollTo(0,0);
  renderView(view, opts);
}

function renderView(view, opts){
  switch(view){
    case "dashboard": renderDashboard(); break;
    case "admit":     renderAdmit(opts); break;
    case "record":    renderRecord(); break;
    case "beds":      renderBeds(); break;
    case "archive":   renderArchive(); break;
    case "users":     renderUsers(); break;
    case "audit":     renderAudit(); break;
    case "train":     renderTraining(); break;
    case "document":  renderDocument(opts); break;
  }
}

$("tabsNav").addEventListener("click", e=>{

});

let dashFilter="";
function renderDashboard(){
  const list = activeEncounters().slice().sort((a,b)=>{
    const order={red:0,amber:1,green:2};
    const aa=order[a.triage?.acuity?.color||"green"], bb=order[b.triage?.acuity?.color||"green"];
    if(aa!==bb) return aa-bb; return a.admittedAt-b.admittedAt;
  });
  const f = dashFilter.trim();
  const shown = f? list.filter(e=>{ const p=getPatient(e.patientId); return p && (p.name.includes(f)||p.id.includes(f)||e.id.includes(f)); }) : list;

  const counts = { total:list.length, red:0, amber:0, green:0, ready:0 };
  list.forEach(e=>{ const c=e.triage?.acuity?.color||"green"; counts[c]++; if(e.status===STATUS.READY) counts.ready++; });

  const rows = shown.length? shown.map(e=>{
    const p=getPatient(e.patientId); const ac=e.triage?.acuity||{color:"green"};
    return `<tr class="clickable" data-enc="${e.id}">
      <td>${e.bed? esc(e.bed):'<span class="muted">—</span>'}</td>
      <td class="acuity-cell ${ac.color}"><b>${esc(p?p.name:"—")}</b></td>
      <td class="nowrap muted">${esc(p?p.id:"")}</td>
      <td class="nowrap">${fmtWait(e.admittedAt)}</td>
      <td><span class="badge ${ac.color}"><span class="dot ${ac.color}"></span>${ACUITY_HE[ac.color]} · ESI ${ac.esi||"-"}</span></td>
      <td>${statusBadge(e.status)}</td>
      <td class="nowrap"><button class="btn sm ghost" data-enc="${e.id}">פתח תיק ←</button></td>
    </tr>`;
  }).join("") : `<tr><td class="empty" colspan="7">אין מטופלים פעילים במיון כרגע. לחצו על "קבלת חולה חדש" כדי להתחיל.</td></tr>`;

  $("dashboardView").innerHTML = `
    <div class="page-head">
      <div><h2>לוח בקרה — מיון רפואה דחופה</h2><p>תמונת מצב בזמן אמת של כל המטופלים הפעילים</p></div>
      ${can("admit")? `<button class="btn teal" id="dashAdmit">➕ קבלת חולה חדש</button>`:""}
    </div>
    <div class="cards">
      <div class="stat teal"><div class="label">סה"כ במיון</div><div class="value">${counts.total}</div></div>
      <div class="stat red"><div class="label">קריטי (אדום)</div><div class="value">${counts.red}</div></div>
      <div class="stat amber"><div class="label">דחוף (צהוב)</div><div class="value">${counts.amber}</div></div>
      <div class="stat green"><div class="label">יציב (ירוק)</div><div class="value">${counts.green}</div></div>
      <div class="stat"><div class="label">מוכנים לשחרור</div><div class="value">${counts.ready}</div></div>
    </div>
    <div class="toolbar">
      <div class="search"><input class="ctrl" id="dashSearch" placeholder="חיפוש לפי שם / ת.ז / מספר ביקור" value="${esc(dashFilter)}"></div>
      <div class="spacer"></div>
      <span class="muted" style="font-size:.84rem;">עודכן: ${fmtTime(Date.now())}</span>
    </div>
    <div class="tbl-wrap">
      <table class="tbl">
        <thead><tr><th>מיטה</th><th>שם המטופל</th><th>ת"ז</th><th>זמן המתנה</th><th>דחיפות (טריאז')</th><th>סטטוס</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;

  const da=$("dashAdmit"); if(da) da.addEventListener("click",()=>navigate("admit"));
  $("dashboardView").querySelectorAll("tr.clickable, button[data-enc]").forEach(el=>{
    el.addEventListener("click",ev=>{ ev.stopPropagation(); navigate("record",{encId:el.dataset.enc}); });
  });
  const ds=$("dashSearch");
  ds.addEventListener("input",()=>{ dashFilter=ds.value; const pos=ds.selectionStart; renderDashboard(); const n=$("dashSearch"); if(n){n.focus();n.setSelectionRange(pos,pos);} });
}

function statusBadge(s){
  const map={ [STATUS.WAIT_NURSE]:"amber",[STATUS.WAIT_DOC]:"navy",[STATUS.IN_WORKUP]:"navy",
    [STATUS.RESULTS_IN]:"teal",[STATUS.READY]:"green",[STATUS.ADMITTED]:"navy",[STATUS.DISCHARGED]:"gray" };
  return `<span class="badge ${map[s]||"gray"}">${esc(s)}</span>`;

function renderResultBlock(o){

      ${o.results.map(r=>`<div class="result-row"><span>${esc(r.he)} <span class="muted">(${esc(r.k)})</span></span>
        <span class="rv ${r.flag==='H'?'high':r.flag==='L'?'low':''}">${r.val} ${esc(r.unit)} ${r.flag?`<span class="flag ${r.flag}">${r.flag==='H'?'▲ גבוה':'▼ נמוך'}</span>`:''} <span class="muted" style="font-weight:400;font-size:.72rem;">(${r.low}-${r.high})</span></span></div>`).join("")}
    </div>`;
  }
  return `<div style="margin-bottom:14px;"><div style="font-weight:700;color:var(--navy-dark);margin-bottom:6px;">🖥️ ${esc(o.test)} <span class="muted" style="font-weight:400;font-size:.8rem;">— פוענח ${fmtTime(o.resultedAt)}</span></div>
    <div class="radiology-report">${esc(o.results)}</div></div>`;

function wireOrders(enc,p){
  const so=$("sendOrders"); if(!so) return;
  document.querySelectorAll("#labChk label, #imgChk label").forEach(l=>{
    const cb=l.querySelector("input"); cb.addEventListener("change",()=>l.classList.toggle("checked",cb.checked));
  });
  so.addEventListener("click",()=>{
    const labs=[...document.querySelectorAll("#labChk input:checked")].map(i=>i.value);
    const imgs=[...document.querySelectorAll("#imgChk input:checked")].map(i=>i.value);
    if(!labs.length && !imgs.length){ toast("בחר לפחות בדיקה אחת","err"); return; }
    const indication=$("ord_indication").value.trim();
    if(imgs.length && !indication){ toast("אינדיקציה קלינית חובה עבור בדיקות דימות","err"); $("ord_indication").focus(); return; }
    labs.forEach(panel=> enc.orders.push({ id:"O"+nextSeq(), type:"lab", test:panel, indication:"", status:"pending", orderedAt:Date.now() }));
    imgs.forEach(im=> enc.orders.push({ id:"O"+nextSeq(), type:"imaging", test:im, indication, status:"pending", orderedAt:Date.now() }));
    if(enc.status===STATUS.WAIT_DOC||enc.status===STATUS.WAIT_NURSE) enc.status=STATUS.IN_WORKUP;
    enc.events.unshift({ts:Date.now(),txt:`הוזמנו ${labs.length+imgs.length} בדיקות ע"י ${session.name}`});
    audit("הזמנת בדיקות",`${p.name} · ${enc.id} · ${[...labs,...imgs].join(", ")}`); saveState();
    toast("ההפניות נשלחו — סטטוס: בבירור","ok"); renderRecord();
  });
  document.querySelectorAll("[data-result]").forEach(b=>{
    b.addEventListener("click",()=>{
      const o=enc.orders.find(x=>x.id===b.dataset.result); if(!o) return;
      simulateResult(o);
      o.status="resulted"; o.resultedAt=Date.now();
      if(!enc.orders.some(x=>x.status!=="resulted")) enc.status=STATUS.RESULTS_IN;
      enc.events.unshift({ts:Date.now(),txt:`התקבלה תוצאה: ${o.test}`});
      audit("קבלת תוצאות בדיקה",`${p.name} · ${o.test}`); saveState();
      toast("התקבלו תוצאות","ok"); renderRecord();
    });
  });
}
function simulateResult(o){
  if(o.type==="lab"){
    const analytes=LAB_CATALOG[o.test]||[];
    o.results=analytes.map(a=>{
      const dec = (a.k==="HGB"||a.k==="K"||a.k==="Creat"||a.k==="INR")?1:0;
      const val=rnd(a.gen[0],a.gen[1],dec);
      let flag=""; if(val>a.high)flag="H"; else if(val<a.low)flag="L";
      return { k:a.k, he:a.he, unit:a.unit, val, low:a.low, high:a.high, flag };
    });
  } else {
    const tpls=RADIOLOGY_TEMPLATES[o.test]||["בדיקה תקינה ללא ממצא חד פתולוגי."];
    o.results = tpls[Math.floor(Math.random()*tpls.length)] + `\n\nד"ר מ. רדיולוג — מכון הדימות, OM Hospital.`;
  }
}

function wireDisposition(enc,p){
  const sd=$("saveDispo");
  if(sd) sd.addEventListener("click",()=>{
    enc.diagnosis=$("dx").value.trim(); enc.clinicalCourse=$("course").value.trim(); enc.disposition=$("dispo").value;

  });
  const sdays=$("sickDays"); if(says_exists(sdays)) sdays.addEventListener("change",()=>{ enc.sickLeaveDays=sdays.value; saveState(); });

  // route options depend on drug
  const drugSel=$("rx_drug"), routeSel=$("rx_route");
  function refreshRoutes(){
    if(!drugSel||!routeSel) return;
    const d=FORMULARY.find(x=>x.name===drugSel.value);
    routeSel.innerHTML=(d?d.routes:["PO"]).map(r=>`<option value="${r}">${ROUTE_HE[r]}</option>`).join("");

    const kind=$("rx_type").value;

      route:routeSel.value, kind, administered:false, administeredAt:null, rxBy:session.name };

      confirmModal(`⚠️ אזהרת אלרגיה`,

        ()=>{ med.allergyOverride=true; enc.meds.push(med); enc.events.unshift({ts:Date.now(),txt:`נרשמה ${drug} (override אלרגיה) ע"י ${session.name}`}); audit("רישום תרופה (override אלרגיה)",`${p.name} · ${drug}`); saveState(); toast("נרשם עם תיעוד חריגה","err"); renderRecord(); },

      return;

    enc.meds.push(med);
    enc.events.unshift({ts:Date.now(),txt:`נרשמה תרופה: ${drug} ${dose}${med.unit} ${med.freq}`});
    audit("רישום תרופה",`${p.name} · ${drug}`); saveState();
    toast("התרופה נוספה","ok"); renderRecord();
  });

  document.querySelectorAll("[data-give]").forEach(b=>b.addEventListener("click",()=>{

    enc.events.unshift({ts:Date.now(),txt:`ניתנה תרופה: ${m.drug} ע"י ${session.name}`});
    audit("מתן תרופה (MAR)",`${p.name} · ${m.drug}`); saveState(); toast("תועד מתן התרופה","ok"); renderRecord();
  }));
  document.querySelectorAll("[data-delmed]").forEach(b=>b.addEventListener("click",()=>{
    enc.meds=enc.meds.filter(x=>x.id!==b.dataset.delmed); saveState(); renderRecord();

/* ---------- Discharge ---------- */
function dischargeFlow(enc){
  const p=getPatient(enc.patientId);
  if(!enc.diagnosis){ toast("יש להזין אבחנה לפני שחרור","err"); currentRecTab="disposition"; renderRecord(); return; }
  confirmModal("שחרור מטופל",
    `האם לשחרר את <b>${esc(p.name)}</b> ולהפיק מכתב שחרור רשמי?<br><br>לאחר השחרור המטופל יוסר מלוח הבקרה ויעבור לארכיון.`,
    ()=>{
      const admit = enc.disposition && enc.disposition.startsWith("אשפוז");
      enc.status = admit? STATUS.ADMITTED : STATUS.DISCHARGED;
      enc.dischargedAt=Date.now();
      enc.signedBy = session.role==="doctor"? session.name : (enc.treatingDoctorName||session.name);
      enc.signedLicense = session.role==="doctor"? session.license : "";
      enc.events.unshift({ts:Date.now(),txt:`${admit?"אושפז למחלקה":"שוחרר"} ע"י ${session.name}`});
      audit(admit?"אשפוז מטופל":"שחרור מטופל",`${p.name} · ${enc.id}`); saveState();
      navigate("document",{encId:enc.id});
    }, "שחרר והפק מכתב");
}

/* ==================================================================
   DATA modal (export / import / reset)
   ================================================================== */
function openDataModal(){
  openModal(`<div class="modal-head"><h3>נתוני המערכת</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <p class="muted" style="font-size:.88rem;">כל הנתונים נשמרים מקומית בדפדפן זה (localStorage). אין שרת חיצוני.</p>
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:12px;">
        <button class="btn" id="d_export">⬇️ ייצוא גיבוי (JSON)</button>
        <button class="btn ghost" id="d_import">⬆️ ייבוא גיבוי</button>
        <input type="file" id="d_file" accept="application/json" style="display:none;">
        <button class="btn red" id="d_reset">🗑️ איפוס כל הנתונים</button>
      </div>
      <p class="muted" style="font-size:.8rem;margin-top:14px;">נתונים סטטיסטיים: ${state.patients.length} מטופלים · ${state.encounters.length} מפגשים · ${state.users.length} משתמשים.</p>
    </div>`);
  $("d_export").addEventListener("click",()=>{
    const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download=`om-hospital-backup-${new Date().toISOString().slice(0,10)}.json`; a.click();
    toast("הגיבוי יוצא","ok");
  });
  $("d_import").addEventListener("click",()=>$("d_file").click());
  $("d_file").addEventListener("change",e=>{
    const f=e.target.files[0]; if(!f) return; const r=new FileReader();
    r.onload=()=>{ try{ const data=JSON.parse(r.result); if(!data.users||!data.encounters) throw 0;
      state=data; saveState(); closeModal(); toast("הגיבוי יובא בהצלחה","ok"); navigate("dashboard"); }
      catch(err){ toast("קובץ לא תקין","err"); } };
    r.readAsText(f);
  });
  $("d_reset").addEventListener("click",()=>{
    confirmModal("איפוס נתונים","פעולה זו תמחק את כל המטופלים, המפגשים והיומן ותחזיר את המערכת למצב התחלתי (חשבונות הצוות יישמרו). להמשיך?",
      ()=>{ const users=state.users; state=freshState(); state.users=users; saveState(); toast("הנתונים אופסו","ok"); navigate("dashboard"); },"אפס הכל");
  });
}

/* ---------- Training state & stats ---------- */
let tCase=null, tPatient=null, tState=null, tRxMeds=[];
function loadTrainStats(){ try{ return JSON.parse(localStorage.getItem(TRAIN_KEY))||{cases:0,correctDx:0,correctDispo:0}; }catch(e){ return {cases:0,correctDx:0,correctDispo:0}; } }
function saveTrainStats(s){ try{ localStorage.setItem(TRAIN_KEY, JSON.stringify(s)); }catch(e){} }

function genTPatient(c){
  const female = c.gender==="female" || (c.gender==="any" && Math.random()<0.5);
  const fn = female? FNAMES_F[Math.floor(Math.random()*FNAMES_F.length)] : FNAMES_M[Math.floor(Math.random()*FNAMES_M.length)];
  const ln = LNAMES[Math.floor(Math.random()*LNAMES.length)];
  const age = rnd(c.ageRange[0], c.ageRange[1]);
  const d=new Date(); const dob=`${d.getFullYear()-age}-${String(rnd(1,12)).padStart(2,"0")}-${String(rnd(1,28)).padStart(2,"0")}`;
  let id=""; for(let i=0;i<9;i++) id+=Math.floor(Math.random()*10);
  return { id, name:`${fn} ${ln}`, gender:female?"נקבה":"זכר", dob, age, bloodType:["A+","B+","O+","AB+","O-","A-"][Math.floor(Math.random()*6)], hmo:HMOS[Math.floor(Math.random()*HMOS.length)], allergies:[] };
}

function newTrainingCase(){
  tCase = CASE_BANK[Math.floor(Math.random()*CASE_BANK.length)];
  tPatient = genTPatient(tCase);
  tState = { vitalsRevealed:false, examRevealed:false, asked:[], chat:[], labsDone:false, imaging:{}, dxGuess:null, decided:false, decision:null };
  tRxMeds = [];
  renderTraining();
}

/* ---------- Render ---------- */
function renderTraining(){
  const stats=loadTrainStats();
  const acc = stats.cases? Math.round(stats.correctDispo/stats.cases*100):0;
  if(!tCase){
    $("trainView").innerHTML = `
      <div class="sim-hero">
        <div class="grow">
          <h2>🎓 סימולציית מקרים קליניים</h2>
          <p>קבל מטופל וירטואלי עם אבחנה חבויה. תשאל, בדוק מדדים, הזמן מעבדה ודימות, קבע אבחנה — והחלט על הניתוב הנכון (ניתוח / אשפוז / שחרור). המערכת תיתן לך פידבק רפואי מלא.</p>
        </div>
        <div class="sim-score">
          <div class="s"><div class="v">${stats.cases}</div><div class="l">מקרים</div></div>
          <div class="s"><div class="v">${stats.correctDispo}</div><div class="l">החלטות נכונות</div></div>
          <div class="s"><div class="v">${acc}%</div><div class="l">דיוק</div></div>
        </div>
      </div>
      <div class="panel panel-pad" style="text-align:center;padding:40px;">
        <div style="font-size:3rem;margin-bottom:8px;">🚑</div>
        <h3 style="margin:0 0 6px;color:var(--navy-dark);">מוכן למשמרת?</h3>
        <p class="muted" style="margin:0 0 18px;">לחץ כדי לקבל מטופל חדש לחדר המיון.</p>
        <button class="btn teal" id="tNew" style="font-size:1.05rem;padding:13px 30px;">🆕 קבל חולה חדש</button>
      </div>`;
    $("tNew").addEventListener("click", newTrainingCase);
    return;
  }
  renderActiveCase();
}

          ${ts.vitalsRevealed? `

              ${vitBox("סטורציה",v.spo2,"%")}${vitBox("כאב",v.pain,"/10")}
            </div>

            ${dxOptions().map(d=>`<option ${ts.dxGuess===d?"selected":""}>${esc(d)}</option>`).join("")}

          <button class="btn block sm" id="tDxBtn" ${ts.decided?"disabled":""}>אשר אבחנה</button>

  const tv=$("tVitals"); if(tv) tv.addEventListener("click",()=>{ ts.vitalsRevealed=true; renderActiveCase(); });
  const te=$("tExam"); if(te) te.addEventListener("click",()=>{ ts.examRevealed=true; renderActiveCase(); });

  $("tAskBtn").addEventListener("click",()=>{ const inp=$("tAskInput"); askFreeText(inp.value); inp.value=""; });
  $("tAskInput").addEventListener("keydown",e=>{ if(e.key==="Enter"){ askFreeText(e.target.value); e.target.value=""; } });
  $("tDxBtn").addEventListener("click", confirmDxGuess);
  document.querySelectorAll("[data-dispo]").forEach(b=>b.addEventListener("click",()=>decideDispo(b.dataset.dispo)));

  // restore outcome/feedback if already decided

function vitBox(label,val,unit){ return `<div class="vital"><label>${label} <span class="muted">${unit}</span></label><div style="font-size:1.15rem;font-weight:800;color:var(--navy-dark);margin-top:4px;">${esc(val)}</div></div>`; }

function dxOptions(){
  // all bank diagnoses + ensure current; shuffle deterministically per case
  const all = CASE_BANK.map(c=>c.dx);
  return all.slice().sort();
}

/* ---------- Anamnesis ---------- */
function askQuestion(key){
  const c=tCase, ts=tState;
  const qChip = Q_CHIPS.find(q=>q.key===key);
  if(ts.asked.includes(key)) return;
  ts.asked.push(key);
  ts.chat.push({t:"q", x: qChip?qChip.label:key});
  const ans = c.qa[key] || "לפי המטופל: אין משהו מיוחד לציין בנושא הזה.";
  ts.chat.push({t:"a", x: ans});
  renderActiveCase(); scrollChat();
}
function askFreeText(text){
  text=(text||"").trim(); if(!text) return;
  const c=tCase, ts=tState;
  ts.chat.push({t:"q", x:text});
  // map keyword -> key
  let key=null;
  for(const kw in KW_MAP){ if(text.includes(kw)){ key=KW_MAP[kw]; break; } }
  let ans;
  if(key && c.qa[key]) ans=c.qa[key];
  else {
    // try substring match against any answer
    ans = "לפי המטופל: אני לא בטוח, אבל מה שמטריד אותי הכי הרבה זה " + c.chief.replace(/מזה.*/,"").trim() + ".";
  }
  if(key && !ts.asked.includes(key)) ts.asked.push(key);
  ts.chat.push({t:"a", x:ans});
  renderActiveCase(); scrollChat();
}
function scrollChat(){ const el=$("tChat"); if(el) el.scrollTop=el.scrollHeight; }

/* ---------- Labs ---------- */
function renderTrainLabs(c){
  const panels=["ספירת דם (CBC)","כימיה (Chemistry)","טרופונין (Troponin)"];
  let html=`<div style="font-weight:700;color:var(--navy-dark);margin-bottom:6px;">🩸 תוצאות מעבדה</div>`;
  panels.forEach(pn=>{
    LAB_CATALOG[pn].forEach(a=>{
      const ov=c.labs&&c.labs[a.k];
      const dec=(a.k==="HGB"||a.k==="K"||a.k==="Creat"||a.k==="INR")?1:0;
      const range = ov? ov : [a.low + (a.high-a.low)*0.25, a.high - (a.high-a.low)*0.25];
      const val=rnd(range[0],range[1],dec);
      const flag = val>a.high?"H":val<a.low?"L":"";
      html+=`<div class="result-row"><span>${esc(a.he)} <span class="muted">(${esc(a.k)})</span></span>
        <span class="rv ${flag==='H'?'high':flag==='L'?'low':''}">${val} ${esc(a.unit)} ${flag?`<span class="flag ${flag}">${flag==='H'?'▲':'▼'}</span>`:""} <span class="muted" style="font-weight:400;font-size:.72rem;">(${a.low}-${a.high})</span></span></div>`;
    });
  });
  return html;
}

/* ---------- Imaging ---------- */
function openImaging(modality){
  const c=tCase; const im=c.imaging[modality]; if(!im) return;
  tState.imaging[modality]=true;
  const svg = SVG_LIB[im.svg]? SVG_LIB[im.svg]() : "";
  const term = encodeURIComponent(c.dxEn);
  openModal(`<div class="modal-head"><h3>🖥️ ${esc(modality)}</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="xray">${svg}</div>
      <div class="radiology-report" style="margin-top:12px;"><b>פענוח רדיולוג:</b><br>${esc(im.report)}</div>
      <p class="hint" style="margin-top:10px;">להשוואה עם תמונות אמיתיות ממאגרים רפואיים פתוחים:</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <a class="btn ghost sm" href="https://radiopaedia.org/search?q=${term}&scope=cases" target="_blank" rel="noopener">Radiopaedia ↗</a>
        <a class="btn ghost sm" href="https://commons.wikimedia.org/w/index.php?search=${term}+x-ray&title=Special:MediaSearch&type=image" target="_blank" rel="noopener">Wikimedia ↗</a>
      </div>
    </div>
    <div class="modal-foot"><button class="btn" onclick="closeModal()">סגור</button></div>`, true);
  renderActiveCase();
}

/* ---------- Diagnosis guess ---------- */
function confirmDxGuess(){
  const ts=tState, c=tCase;
  const g=$("tDxGuess").value; if(!g){ toast("בחר אבחנה","err"); return; }
  ts.dxGuess=g;
  const correct = g===c.dx;
  ts._dxFeedback = correct
    ? `<div class="badge green" style="width:100%;justify-content:center;">✓ אבחנה נכונה!</div>`
    : `<div class="badge amber" style="width:100%;justify-content:center;">האבחנה שציינת אינה המדויקת ביותר — נראה בסוף.</div>`;
  $("tDxFeedback").innerHTML = ts._dxFeedback;
  ts._dxCorrect = correct;
}

/* ---------- Disposition decision ---------- */
function decideDispo(k){
  const ts=tState, c=tCase;
  if(ts.decided) return;
  ts.decided=true; ts.decision=k;
  const correct = k===c.correct;
  const critical = (c.critical||[]).includes(k);

  // update stats
  const stats=loadTrainStats(); stats.cases++; if(correct) stats.correctDispo++; if(ts._dxCorrect) stats.correctDx++; saveTrainStats(stats);

  const dispoSuccess = c.success || "המטופל קיבל את הטיפול המתאים ומצבו יציב.";
  const wrongMsg = (c.wrong && c.wrong[k]) || `החלטה שגויה — במקרה זה הניתוב הנכון הוא: ${DISPO_LABEL[c.correct]}.`;

  let html="";
  if(correct){
    html += `<div class="reveal-card"><h3 class="feedback-good">✅ החלטה נכונה — ${esc(DISPO_LABEL[k])}</h3>
      <p style="margin:6px 0;">${esc(dispoSuccess)}</p>
      <p class="muted" style="margin:0;"><b>נימוק:</b> ${esc(c.rationale)}</p></div>`;
  } else {
    if(critical) html += `<div class="critical-banner">⛔ כשל קריטי!</div>`;
    html += `<div class="reveal-card fail" style="margin-top:${critical?'10px':'0'};"><h3 class="feedback-bad">❌ החלטה שגויה — ${esc(DISPO_LABEL[k])}</h3>
      <p style="margin:6px 0;">${esc(wrongMsg)}</p>
      <p class="muted" style="margin:0;"><b>הניתוב הנכון:</b> ${esc(DISPO_LABEL[c.correct])} — ${esc(c.rationale)}</p></div>`;
  }
  // reveal diagnosis
  html += `<div class="panel panel-pad" style="margin-top:12px;">
    <div style="font-weight:700;color:var(--navy-dark);margin-bottom:4px;">האבחנה החבויה הייתה:</div>
    <div style="font-size:1.15rem;font-weight:900;color:var(--navy);">${c.emoji} ${esc(c.dx)}</div>
    ${ts.dxGuess? `<div class="muted" style="margin-top:6px;">האבחנה שלך: ${esc(ts.dxGuess)} ${ts._dxCorrect?'<span class="feedback-good">(נכון ✓)</span>':'<span class="feedback-bad">(לא מדויק)</span>'}</div>`:""}
    <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn teal sm" id="tDoc">📄 הפק מרשם ומכתב שחרור</button>
      <button class="btn sm" id="tNext">🆕 מקרה חדש</button>
    </div></div>`;

  ts._outcomeHtml=html;
  renderActiveCase();
  $("tOutcome").scrollIntoView({behavior:"smooth",block:"nearest"});
  const td=$("tDoc"); if(td) td.addEventListener("click",openTrainRx);
  const tn=$("tNext"); if(tn) tn.addEventListener("click",newTrainingCase);
}

function revealCase(decision){
  // surrender path — just reveal without scoring a correct decision
  tState.decided=true;
  const stats=loadTrainStats(); stats.cases++; if(tState._dxCorrect) stats.correctDx++; saveTrainStats(stats);
  const c=tCase;
  tState._outcomeHtml = `<div class="reveal-card"><h3>📖 גילוי המקרה</h3>
    <p style="margin:6px 0;">האבחנה החבויה: <b>${c.emoji} ${esc(c.dx)}</b></p>
    <p class="muted" style="margin:0;"><b>הניתוב הנכון:</b> ${esc(DISPO_LABEL[c.correct])} — ${esc(c.rationale)}</p>
    <div style="margin-top:12px;"><button class="btn sm" id="tNext3">🆕 מקרה חדש</button></div></div>`;
  renderActiveCase();
  const tn=$("tNext3"); if(tn) tn.addEventListener("click",newTrainingCase);
}

/* ---------- Prescription + discharge document (reuses official template) ---------- */
function openTrainRx(){
  // default meds suggestion per disposition
  if(!tRxMeds.length){
    tRxMeds = [{drug:"פרצטמול (אקמול)", dose:"500", unit:"מ\"ג", freq:"3 פעמים ביום (X3)", route:"PO"}];
  }
  renderRxModal();
}
function renderRxModal(){
  const list = tRxMeds.length? tRxMeds.map((m,i)=>`<div class="med-row"><span class="mname">${esc(m.drug)}</span><span>${esc(m.dose)} ${esc(m.unit)}</span><span class="muted">·</span><span>${esc(m.freq)}</span><span class="pill-route">${esc(ROUTE_HE[m.route]||m.route)}</span><div class="grow"></div><button class="btn sm ghost" data-rxdel="${i}">✕</button></div>`).join("") : `<p class="muted">לא נוספו תרופות.</p>`;
  openModal(`<div class="modal-head"><h3>📝 מרשם רופא — OM Hospital</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="grid2">
        <div class="field"><label>תרופה</label><select class="ctrl" id="rxn_drug">${FORMULARY.map(d=>`<option value="${esc(d.name)}">${esc(d.name)}</option>`).join("")}</select></div>
        <div class="field"><label>מינון</label><div style="display:flex;gap:6px;"><input class="ctrl" id="rxn_dose" placeholder="500" style="flex:1;"><select class="ctrl" id="rxn_unit" style="width:80px;"><option>מ"ג</option><option>גרם</option><option>מ"ל</option></select></div></div>
        <div class="field"><label>תדירות</label><select class="ctrl" id="rxn_freq"><option>פעם ביום (X1)</option><option>פעמיים ביום (X2)</option><option>3 פעמים ביום (X3)</option><option>לפי הצורך (PRN)</option></select></div>
        <div class="field"><label>דרך מתן</label><select class="ctrl" id="rxn_route"></select></div>
      </div>
      <button class="btn teal sm" id="rxnAdd">➕ הוסף למרשם</button>
      <div style="margin-top:14px;">${list}</div>
    </div>
    <div class="modal-foot"><button class="btn ghost" onclick="closeModal()">ביטול</button><button class="btn" id="rxnGen">📄 הפק מכתב שחרור</button></div>`, true);
  const ds=$("rxn_drug"), rs=$("rxn_route");
  const refr=()=>{ const d=FORMULARY.find(x=>x.name===ds.value); rs.innerHTML=(d?d.routes:["PO"]).map(r=>`<option value="${r}">${ROUTE_HE[r]}</option>`).join(""); };
  ds.addEventListener("change",refr); refr();
  $("rxnAdd").addEventListener("click",()=>{
    const drug=ds.value, dose=$("rxn_dose").value.trim(); if(!dose){ toast("הזן מינון","err"); return; }
    tRxMeds.push({drug, dose, unit:$("rxn_unit").value, freq:$("rxn_freq").value, route:rs.value}); renderRxModal();
  });
  document.querySelectorAll("[data-rxdel]").forEach(b=>b.addEventListener("click",()=>{ tRxMeds.splice(+b.dataset.rxdel,1); renderRxModal(); }));
  $("rxnGen").addEventListener("click", generateTrainDoc);
}
function generateTrainDoc(){
  const c=tCase, p=tPatient, ts=tState;
  const now=Date.now();
  const enc = {
    _train:true, id:`OM-SIM-${Math.floor(1000+Math.random()*9000)}`, patientId:p.id, status:STATUS.DISCHARGED,
    triage:{ bp:c.vitals.bp,pulse:c.vitals.pulse,temp:c.vitals.temp,spo2:c.vitals.spo2,pain:c.vitals.pain,weight:"" },
    chiefComplaint:c.chief, hpi:c.story,
    admittedAt: now-3*3600*1000, dischargedAt:now,
    diagnosis:c.dx, clinicalCourse:`${c.exam} ${ts.decision===c.correct?"ההחלטה הקלינית: "+DISPO_LABEL[c.correct]+".":""}`,
    disposition: DISPO_LABEL[ts.decision]||"",
    orders: Object.keys(ts.imaging).map(m=>({type:"imaging",test:m,status:"resulted",resultedAt:now,results:c.imaging[m].report})),
    meds: [], dischargeMeds:[], sickLeaveDays: ts.decision==="discharge"?"3":"0",
    form17:"טופס 17 התקבל", signedBy: session?session.name:'ד"ר אופק משאל', signedLicense: session&&session.license?session.license:"88421"
  };
  // attach discharge meds as kind:home for the document's home-meds section
  enc.meds = tRxMeds.map((m,i)=>({id:"RX"+i, kind:"home", drug:m.drug, dose:m.dose, unit:m.unit, freq:m.freq, route:m.route, administered:false}));
  const patient = { id:p.id, name:p.name, dob:p.dob, gender:p.gender, bloodType:p.bloodType, hmo:p.hmo,
    phone:"", emergencyContact:"", allergies:[], pastHistory: tCase.qa.pmh||"", homeMeds: tCase.qa.meds||"" };
  closeModal();
  navigate("document", { enc, patient });
}

/* ==================================================================
   INIT
   ================================================================== */
function init(){
  loadState();
  showLoginFoot();
  // restore session if present
  try{
    const s=sessionStorage.getItem("om_session");
    if(s){ const sObj=JSON.parse(s); const u=state.users.find(x=>x.id===sObj.id); if(u){ session={...u,sessionDept:sObj.sessionDept}; enterApp(); } }
  }catch(e){}
  // periodic refresh of wait times on dashboard
  setInterval(()=>{ if(session && currentView==="dashboard") renderDashboard(); }, 30000);
  // register service worker
  if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(()=>{}); }
}
init();
</script>

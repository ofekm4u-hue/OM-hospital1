<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#070b16">
<title>ניסוי השתלת מחשבה #402</title>
<style>
  :root {
    --bg-0: #070b16;
    --bg-1: #0a0e1a;
    --bg-2: #121826;
    --panel: rgba(18, 24, 38, 0.72);
    --border: rgba(89, 130, 180, 0.22);
    --text: #f2f6ff;
    --muted: #8a96b0;
    --faint: #5a6280;
    --neon: #22d3ee;
    --blue: #3b82f6;
    --glow: rgba(34, 211, 238, 0.55);
    --ok: #34d399;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body { height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, "Noto Sans Hebrew", sans-serif;
    background:
      radial-gradient(1200px 800px at 50% -10%, rgba(59,130,246,0.16), transparent 60%),
      radial-gradient(900px 700px at 50% 120%, rgba(34,211,238,0.10), transparent 55%),
      linear-gradient(160deg, var(--bg-1), var(--bg-0) 70%);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    position: relative;
  }

  /* subtle scanline / grid texture for the "lab" feel */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(120,160,210,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(120,160,210,0.035) 1px, transparent 1px);
    background-size: 44px 44px;
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    width: min(440px, 100%);
    background: var(--panel);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: clamp(22px, 6vw, 34px);
    box-shadow:
      0 30px 80px rgba(0,0,0,0.55),
      inset 0 1px 0 rgba(255,255,255,0.04);
    text-align: center;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    letter-spacing: 0.5px;
    color: var(--neon);
    background: rgba(34,211,238,0.08);
    border: 1px solid rgba(34,211,238,0.25);
    padding: 6px 12px;
    border-radius: 999px;
    margin-bottom: 18px;
  }
  .badge .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--neon);
    box-shadow: 0 0 10px var(--glow);
    animation: pulse 1.4s ease-in-out infinite;
  }

  h1 {
    font-size: clamp(20px, 6vw, 26px);
    font-weight: 800;
    line-height: 1.25;
    margin-bottom: 8px;
    letter-spacing: -0.2px;
  }
  .subtitle {
    font-size: clamp(12px, 3.6vw, 14px);
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 22px;
  }

  /* the black stimulus square */
  .stimulus {
    width: 100%;
    aspect-ratio: 16 / 11;
    border-radius: 16px;
    background: #000;
    border: 1px solid rgba(120,160,210,0.18);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #4a5573;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.3px;
    margin-bottom: 22px;
    overflow: hidden;
    position: relative;
    box-shadow: inset 0 0 60px rgba(0,0,0,0.8);
  }
  .stimulus .label {
    position: relative;
    z-index: 2;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: opacity 0.3s;
  }
  .stimulus .label::before {
    content: "";
    width: 9px; height: 9px; border-radius: 50%;
    background: #39435f;
  }
  .stimulus.flashing .label { opacity: 0; }

  /* button */
  .btn {
    width: 100%;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: clamp(15px, 4.4vw, 17px);
    font-weight: 700;
    color: #02121a;
    padding: 16px 18px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--neon), var(--blue));
    box-shadow: 0 10px 30px rgba(34,211,238,0.30), 0 2px 0 rgba(255,255,255,0.15) inset;
    transition: transform 0.15s ease, box-shadow 0.25s ease, opacity 0.2s;
    letter-spacing: 0.2px;
  }
  .btn:hover { box-shadow: 0 14px 38px rgba(34,211,238,0.45); transform: translateY(-1px); }
  .btn:active { transform: translateY(1px) scale(0.99); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* text input */
  .field-label {
    font-size: clamp(12px, 3.6vw, 14px);
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 16px;
  }
  .field-label strong { color: var(--neon); font-weight: 700; }

  .input {
    width: 100%;
    font-family: inherit;
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    text-align: center;
    background: rgba(7,11,22,0.7);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input::placeholder { color: #4a5573; font-weight: 500; }
  .input:focus {
    border-color: var(--neon);
    box-shadow: 0 0 0 3px rgba(34,211,238,0.18);
  }

  /* spinner / loading */
  .loader { padding: 14px 0 6px; }
  .spinner {
    width: 54px; height: 54px;
    margin: 0 auto 20px;
    border-radius: 50%;
    border: 3px solid rgba(120,160,210,0.18);
    border-top-color: var(--neon);
    box-shadow: 0 0 18px rgba(34,211,238,0.35);
    animation: spin 0.9s linear infinite;
  }
  .loading-text {
    font-size: clamp(13px, 3.8vw, 15px);
    color: var(--muted);
    letter-spacing: 0.2px;
    animation: dim 1.6s ease-in-out infinite;
  }

  /* success */
  .success { padding: 8px 0; }
  .check {
    width: 64px; height: 64px;
    margin: 0 auto 18px;
    border-radius: 50%;
    background: rgba(52,211,153,0.12);
    border: 1px solid rgba(52,211,153,0.4);
    display: flex; align-items: center; justify-content: center;
    color: var(--ok);
    font-size: 34px;
    box-shadow: 0 0 30px rgba(52,211,153,0.30);
    animation: pop 0.45s cubic-bezier(0.2, 1.4, 0.4, 1);
  }
  .success-text {
    color: var(--ok);
    font-size: clamp(15px, 4.4vw, 17px);
    font-weight: 700;
    line-height: 1.5;
  }

  .hidden { display: none !important; }

  /* entrance animation for each revealed stage */
  .reveal { animation: reveal 0.45s ease both; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes dim { 0%,100% { opacity: 0.55; } 50% { opacity: 1; } }
  @keyframes pop { 0% { transform: scale(0.4); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  @keyframes reveal { from { opacity: 0; transform: translateY(10px) scale(0.98); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>
  <main class="card">
    <span class="badge"><span class="dot"></span> מערכת פעילה · פרוטוקול 402</span>

    <h1>ניסוי השתלת מחשבה #402</h1>
    <p class="subtitle">מערכת סנכרון תת-הכרתית מבוססת AI</p>

    <!-- The stimulus square is shared across stages A + B -->
    <div class="stimulus" id="stimulus" aria-hidden="true">
      <span class="label" id="stimulusLabel">מדיה תת-הכרתית כבויה</span>
    </div>

    <!-- Stage A: trigger -->
    <section id="stageA">
      <button class="btn" id="flashBtn">הפעל סטימולציה (הבהוב)</button>
    </section>

    <!-- Stage B: input -->
    <section id="stageB" class="hidden">
      <p class="field-label">הסוגסטיה הושתלה. שנה את דעתך כמה פעמים שתרצה, וכשאתה נעול – הקלד את <strong>המילה הסופית</strong>.</p>
      <input class="input" id="wordInput" type="text" inputmode="text" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="הקלד כאן את המילה…">
      <button class="btn" id="syncBtn">אשר וסנכרן נתונים</button>
    </section>

    <!-- Stage C: loading -->
    <section id="stageC" class="hidden">
      <div class="loader">
        <div class="spinner"></div>
        <p class="loading-text">מנתח תנועות אישונים ומסנכרן פרוטוקול…</p>
      </div>
    </section>

    <!-- Stage D: success -->
    <section id="stageD" class="hidden">
      <div class="success">
        <div class="check">✓</div>
        <p class="success-text">הסנכרון הושלם בהצלחה.<br>הסוגסטיה ננעלה בזיכרון המערכת</p>
      </div>
    </section>
  </main>

<script>
  // ====== CONFIG: replace with your real Make.com / Zapier webhook URL ======
  const WEBHOOK_URL = "https://hook.make.com/REPLACE_ME";
  // ==========================================================================

  const stimulus      = document.getElementById("stimulus");
  const stimulusLabel = document.getElementById("stimulusLabel");
  const stageA = document.getElementById("stageA");
  const stageB = document.getElementById("stageB");
  const stageC = document.getElementById("stageC");
  const stageD = document.getElementById("stageD");
  const flashBtn  = document.getElementById("flashBtn");
  const syncBtn   = document.getElementById("syncBtn");
  const wordInput = document.getElementById("wordInput");

  // Vivid neon palette for the "thought implant" flash
  const FLASH_COLORS = [
    "#ff0050", "#00f0ff", "#faff00", "#00ff6a",
    "#b400ff", "#ff7a00", "#ffffff", "#ff00d4", "#0066ff"
  ];

  function showStage(el) {
    el.classList.remove("hidden");
    el.classList.add("reveal");
  }

  // --- Stage A -> flashing effect ---
  flashBtn.addEventListener("click", () => {
    flashBtn.disabled = true;
    runFlash(2000).then(() => {
      stageA.classList.add("hidden");          // remove original button
      stimulusLabel.textContent = "מדיה תת-הכרתית כבויה";
      showStage(stageB);
      setTimeout(() => wordInput.focus(), 150);
    });
  });

  function runFlash(durationMs) {
    return new Promise((resolve) => {
      stimulus.classList.add("flashing");
      const start = performance.now();
      let last = 0;

      function frame(now) {
        // change pattern roughly every ~50ms for a harsh strobe
        if (now - last > 45) {
          last = now;
          const c1 = FLASH_COLORS[(Math.random() * FLASH_COLORS.length) | 0];
          const c2 = FLASH_COLORS[(Math.random() * FLASH_COLORS.length) | 0];
          const angle = (Math.random() * 360) | 0;
          const shape = Math.random();
          if (shape < 0.34) {
            stimulus.style.background = c1;
          } else if (shape < 0.67) {
            stimulus.style.background = `linear-gradient(${angle}deg, ${c1}, ${c2})`;
          } else {
            const size = 20 + ((Math.random() * 50) | 0);
            stimulus.style.background = `radial-gradient(circle at ${(Math.random()*100)|0}% ${(Math.random()*100)|0}%, ${c1}, ${c2} ${size}%)`;
          }
        }

        if (now - start < durationMs) {
          requestAnimationFrame(frame);
        } else {
          stimulus.style.background = "#000";
          stimulus.classList.remove("flashing");
          resolve();
        }
      }
      requestAnimationFrame(frame);
    });
  }

  // --- Stage B -> covert send + loading + success ---
  syncBtn.addEventListener("click", () => {
    const word = wordInput.value.trim();
    if (!word) {
      wordInput.focus();
      return;
    }

    syncBtn.disabled = true;

    // Fire the covert webhook. Never blocks or reveals errors to the participant.
    sendToWebhook(word);

    // Transition to loading
    stageB.classList.add("hidden");
    stimulus.classList.add("hidden");
    showStage(stageC);

    // Fixed 2s delay for showmanship, independent of network response
    setTimeout(() => {
      stageC.classList.add("hidden");
      showStage(stageD);
    }, 2000);
  });

  // also allow Enter key to submit
  wordInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); syncBtn.click(); }
  });

  function sendToWebhook(word) {
    const payload = { text: "אני חושב שהמילה שתבחר תהיה: " + word };
    try {
      fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
        mode: "no-cors",
        keepalive: true
      }).catch(() => { /* silent: the show must go on */ });
    } catch (_) {
      /* silent */
    }
  }
</script>
</body>
</html>

<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>שו"ב | תורן חמ"ל — Live GIS</title>
<link rel="stylesheet" href="shared/tokens.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
<style>
  body { overflow: hidden; }
  .page {
    height: calc(100vh - var(--header-h));
    display: grid;
    grid-template-columns: minmax(0, 7fr) minmax(360px, 3fr);
    gap: 12px;
    padding: 12px;
  }
  @media (max-width: 1080px) {
    .page { grid-template-columns: 1fr; grid-template-rows: 55vh auto; }
  }

  .map-card {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .map-card .map-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #131A26, var(--bg-panel));
  }
  .map-card .map-bar h2 { font-size: 14px; }
  #map { flex: 1; background: #0a0a0a; }

  /* Leaflet dark overrides */
  .leaflet-container { background: #0a0e14; }
  .leaflet-control-attribution {
    background: rgba(10,14,20,0.75) !important;
    color: var(--text-low) !important;
    border-radius: var(--r-pill);
    font-size: 10px !important;
  }
  .leaflet-control-attribution a { color: var(--accent) !important; }
  .leaflet-tile { filter: brightness(0.85) saturate(0.85) hue-rotate(-10deg); }
  .leaflet-marker-icon { transition: transform 1.8s linear; }

  .marker-pin {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid white;
    box-shadow: 0 0 12px rgba(0,0,0,0.6), 0 0 18px var(--accent-glow);
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 700; font-size: 13px;
    font-family: var(--font-ui);
  }
  .marker-pin.patrol { background: var(--accent); }
  .marker-pin.medic { background: var(--ok); }
  .marker-pin.logistics { background: var(--warn); }
  .marker-pin.commander { background: var(--info); }
  .marker-pin.gate { background: var(--border-hi); }

  .side {
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 12px;
    overflow: hidden;
  }
  .side .panel { padding: 14px; }
  .tribe-list {
    display: flex; flex-direction: column; gap: 6px;
    overflow-y: auto;
    max-height: 360px;
    padding-left: 4px;
  }
  .tribe-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    padding: 10px 12px;
    background: var(--bg-elev);
    border: 1px solid var(--border-soft);
    border-radius: var(--r-sm);
    font-size: 13px;
  }
  .tribe-row .tribe-name { font-weight: 600; }
  .tribe-row .meta { color: var(--text-mid); font-size: 11px; margin-top: 2px; }

  .pending-row {
    padding: 8px 12px;
    background: rgba(255,181,71,0.07);
    border: 1px solid rgba(255,181,71,0.25);
    border-radius: var(--r-sm);
    margin-bottom: 6px;
    font-size: 13px;
    display: flex; align-items: center; gap: 8px;
  }

  .events-strip {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 10px 14px;
    display: flex; align-items: center; gap: 12px;
    overflow: hidden;
  }
  .events-strip ul {
    list-style: none; padding: 0; margin: 0;
    display: flex; flex-direction: column; gap: 4px;
    flex: 1;
    overflow: hidden;
    max-height: 84px;
    font-size: 12px;
    color: var(--text-mid);
  }
  .events-strip li { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .events-strip li .ts { color: var(--text-low); font-family: var(--font-mono); margin-left: 6px; }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .stat-card {
    background: var(--bg-elev);
    border: 1px solid var(--border-soft);
    border-radius: var(--r-sm);
    padding: 10px;
    text-align: center;
  }
  .stat-card .stat-n { font-size: 22px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .stat-card .stat-l { font-size: 10px; color: var(--text-low); text-transform: uppercase; letter-spacing: .12em; }
  .stat-card.danger .stat-n { color: var(--danger); }
  .stat-card.warn .stat-n { color: var(--warn); }
  .stat-card.ok .stat-n { color: var(--ok); }
</style>
</head>
<body class="tactical-grid">
  <div id="header"></div>

  <div class="page">
    <!-- Map -->
    <div class="map-card">
      <div class="map-bar">
        <h2>📍 מפת שליטה חיה — <span data-forest-name>—</span></h2>
        <span class="chip"><span class="dot dot--ok"></span> 3 סיורים</span>
        <span class="chip"><span class="dot dot--info"></span> 2 חובשים</span>
        <span class="chip"><span class="dot dot--warn"></span> 1 לוגיסטיקה</span>
        <span style="flex:1"></span>
        <select class="select" data-forest-select style="width:auto; padding:6px 10px;"></select>
        <button class="btn btn--sm" id="btn-broadcast">📢 כריזה המונית</button>
      </div>
      <div id="map"></div>
    </div>

    <!-- Sidebar — Master Forest Registry -->
    <aside class="side">
      <div class="panel">
        <div class="section-title">🌲 מצבת יער חיה</div>
        <div class="stat-grid">
          <div class="stat-card ok"><span class="stat-n" data-stat="hanichim">—</span><span class="stat-l">חניכים פעילים</span></div>
          <div class="stat-card"><span class="stat-n" data-stat="adults">—</span><span class="stat-l">מבוגרים וסגל</span></div>
          <div class="stat-card warn"><span class="stat-n" data-stat="medics">—</span><span class="stat-l">חובשים בשטח</span></div>
          <div class="stat-card danger"><span class="stat-n" data-stat="guards">—</span><span class="stat-l">מאבטחים בשטח</span></div>
        </div>
        <div style="margin-top: 10px; font-size: 11px; color: var(--text-low); text-align: center;">סיכום חי. החמ"ל אינו מנהל כוחות אבטחה — קריאה בלבד.</div>
      </div>

      <div class="panel" style="display:flex; flex-direction:column; min-height:0;">
        <!-- Registry tabs -->
        <div style="display: flex; gap: 4px; margin: -4px -4px 8px; padding: 4px; background: var(--bg-elev); border-radius: var(--r-sm);">
          <button class="reg-tab is-active" data-reg-tab="hanichim" style="flex:1; padding: 8px; border: 0; background: transparent; color: var(--text-hi); font-family: var(--font-ui); font-weight: 600; font-size: 12px; border-radius: 4px; cursor: pointer;">👥 חניכים</button>
          <button class="reg-tab" data-reg-tab="adults" style="flex:1; padding: 8px; border: 0; background: transparent; color: var(--text-mid); font-family: var(--font-ui); font-weight: 600; font-size: 12px; border-radius: 4px; cursor: pointer;">👨‍👩‍👧 מבוגרים</button>
          <button class="reg-tab" data-reg-tab="pending" style="flex:1; padding: 8px; border: 0; background: transparent; color: var(--text-mid); font-family: var(--font-ui); font-weight: 600; font-size: 12px; border-radius: 4px; cursor: pointer;">⚠ ממתינים <span class="badge" id="badge-pending" style="background: var(--warn); color: #1a0e00; padding: 1px 5px; border-radius: 999px; font-size: 10px; margin-right: 4px;">0</span></button>
        </div>
        <input class="input" id="registry-search" placeholder="🔍 חיפוש שמי..." style="padding: 6px 10px; font-size: 12px; height: 30px; margin-bottom: 8px;" autocomplete="off">

        <div id="reg-hanichim" class="reg-pane" style="overflow-y: auto; max-height: 280px;"></div>
        <div id="reg-adults" class="reg-pane" style="overflow-y: auto; max-height: 280px;" hidden></div>
        <div id="reg-pending" class="reg-pane" style="overflow-y: auto; max-height: 280px;" hidden></div>
      </div>

      <div class="panel" style="padding: 14px;">
        <div class="section-title">📤 יציאות חניכים (סמכות חמ"ל)</div>
        <button class="btn btn--primary btn--block" id="btn-approve-checkout">+ אשר יציאת חניך</button>
        <div style="font-size: 11px; color: var(--text-low); margin-top: 6px; text-align: center;">הוצא טופס נייר חתום והכוון לשער</div>
      </div>
    </aside>
  </div>

  <!-- Events strip docks at the bottom only on wide screens -->
  <div class="events-strip" style="margin: 0 12px 12px;">
    <div class="section-title" style="margin: 0;">יומן אירועים</div>
    <ul id="events"></ul>
  </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="shared/engine.js"></script>
<script>
(function () {
  'use strict';
  const { ScoutDB, Bus, UI, SOS, Geo, Toast, util, FORESTS, Auth } = Scout;

  if (!Auth.requireLogin()) return;

  const forestId = util.getParam('forest') || ScoutDB.get('currentForest', 'ben-shemen');
  ScoutDB.set('currentForest', forestId);
  const forest = (ScoutDB.get('forests', []) || FORESTS).find(f => f.id === forestId) || FORESTS[0];

  // Header
  document.getElementById('header').innerHTML = UI.header({
    title: 'תורן חמ"ל — שליטה חיה',
    subtitle: forest.name,
  });
  UI.bindHeader(document.body);
  UI.mockBadge('דמו פרזנטציה');
  document.querySelector('[data-forest-name]').textContent = forest.name;

  // Forest selector
  const sel = document.querySelector('[data-forest-select]');
  sel.innerHTML = (ScoutDB.get('forests', []) || FORESTS).map(f => `<option value="${f.id}" ${f.id === forestId ? 'selected' : ''}>${util.escapeHtml(f.name)}</option>`).join('');
  sel.addEventListener('change', () => { location.href = 'hq-operator.html?forest=' + sel.value; });

  // ====== Mobile block for HQ Station ONLY (hq-op) — hq-shift is hybrid ======
  const persona = UI.currentPersona();
  if (persona.role === 'hq-op' && window.innerWidth < 900) {
    document.body.innerHTML = `
      <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px;">
        <div style="text-align: center; max-width: 380px;">
          <div style="font-size: 56px;">🖥️</div>
          <h2 style="font-family: var(--font-ui); margin: 16px 0 8px;">תחנת חמ"ל — Desktop בלבד</h2>
          <p style="color: var(--text-mid); line-height: 1.6;">חשבון "חמ"ל" מיועד לעבודה ממחשב באוהל החמ"ל הפיזי בלבד. גישה מהמכשיר הנייד חסומה ע"י הגדרות אחראי החמ"ל.</p>
          <p style="color: var(--text-low); font-size: 12px; margin-top: 18px;">לעבודה מהשטח — התחבר כ-<strong style="color: var(--accent);">shift</strong> (אחראי חמ"ל, היברידי).</p>
          <a href="index.html" class="btn btn--ghost" style="margin-top: 16px;">← חזור ל-login</a>
        </div>
      </div>`;
    return;
  }

  // ====== Registry: stats ======
  function renderRegistryStats() {
    const tribes = ScoutDB.get('tribes', []).filter(t => t.forestId === forestId);
    const tribeIds = tribes.map(t => t.id);
    const hanichim = ScoutDB.get('hanichim', []).filter(h => tribeIds.includes(h.tribeId));
    const presentCount = hanichim.filter(h => h.status === 'present' || h.status === 'clinic').length;
    const adults = ScoutDB.get('adults', []).filter(a => a.present);
    const staff = ScoutDB.get('staff', []) || [];
    const medics = staff.filter(s => s.active && ['medic','first-aid','paramedic','doctor','clinic-chief'].includes(s.role)).length;
    const guards = staff.filter(s => s.active && ['guard','patrol','achmash'].includes(s.role)).length;
    document.querySelector('[data-stat="hanichim"]').textContent = presentCount;
    document.querySelector('[data-stat="adults"]').textContent = adults.length + staff.filter(s => s.active).length;
    document.querySelector('[data-stat="medics"]').textContent = medics;
    document.querySelector('[data-stat="guards"]').textContent = guards;

    const pending = listPendingItems().length;
    document.getElementById('badge-pending').textContent = pending;
  }

  // ====== Registry: hanichim (with paper status) ======
  function renderHanichimRegistry() {
    const tribes = ScoutDB.get('tribes', []).filter(t => t.forestId === forestId);
    const tribeMap = Object.fromEntries(tribes.map(t => [t.id, t.name]));
    const term = (document.getElementById('registry-search').value || '').toLowerCase();
    const all = ScoutDB.get('hanichim', []).filter(h => tribeMap[h.tribeId]);
    const filtered = !term ? all : all.filter(h =>
      h.name.toLowerCase().includes(term) ||
      (tribeMap[h.tribeId] || '').toLowerCase().includes(term)
    );
    const presentByTribe = {};
    filtered.forEach(h => {
      if (!presentByTribe[h.tribeId]) presentByTribe[h.tribeId] = [];
      presentByTribe[h.tribeId].push(h);
    });
    const el = document.getElementById('reg-hanichim');
    if (filtered.length === 0) {
      el.innerHTML = `<div style="color: var(--text-low); padding: 14px; text-align: center;">אין תוצאות${term ? ' עבור "' + util.escapeHtml(term) + '"' : ''}</div>`;
      return;
    }
    el.innerHTML = Object.entries(presentByTribe).map(([tribeId, hs]) => {
      const ageGroup = hs.length && hs[0].age < 14 ? 'גדוד צעיר' : 'גדוד בוגר';
      return `
        <div style="padding: 8px 10px; background: var(--bg-elev); border-radius: var(--r-sm); margin-bottom: 6px;">
          <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 6px;">
            <strong style="font-family: var(--font-ui);">שבט ${util.escapeHtml(tribeMap[tribeId])}</strong>
            <span class="chip" style="font-size: 10px;">${util.escapeHtml(ageGroup)}</span>
            <span style="flex:1;"></span>
            <span class="chip chip--ok" style="font-size: 10px;">${hs.length}</span>
          </div>
          ${hs.slice(0, 6).map(h => {
            const statusChip = h.checkoutApproved
              ? '<span class="chip chip--ok" style="font-size: 10px;">✓ מאושר יציאה</span>'
              : h.status === 'released' ? '<span class="chip" style="font-size: 10px;">שוחרר</span>'
              : h.status === 'clinic' ? '<span class="chip chip--warn" style="font-size: 10px;">במרפאה</span>'
              : h.status === 'evacuated' ? '<span class="chip chip--danger" style="font-size: 10px;">פונה</span>'
              : '';
            return `
              <div style="display: flex; align-items: center; gap: 6px; padding: 3px 4px; font-size: 12px;">
                <span style="flex:1;">${util.escapeHtml(h.name)}</span>
                <span style="color: var(--text-low); font-size: 10px;">גיל ${h.age}</span>
                ${statusChip}
              </div>`;
          }).join('')}
          ${hs.length > 6 ? `<div style="font-size: 10px; color: var(--text-low); margin-top: 4px; text-align: center;">+ ${hs.length - 6} חניכים נוספים</div>` : ''}
        </div>`;
    }).join('');
  }

  // ====== Registry: adults & staff ======
  function renderAdultsRegistry() {
    const adults = ScoutDB.get('adults', []) || [];
    const staff = (ScoutDB.get('staff', []) || []).filter(s => s.active && !s.guestPass);
    const term = (document.getElementById('registry-search').value || '').toLowerCase();
    const filteredAdults = !term ? adults : adults.filter(a => a.name.toLowerCase().includes(term));
    const filteredStaff  = !term ? staff  : staff.filter(s => s.name.toLowerCase().includes(term));
    const groups = [
      { label: '👨‍👩‍👧 הורים נוכחים', items: filteredAdults.filter(a => a.role === 'parent' && a.present) },
      { label: '🎯 הנהגה ודרג מוביל',  items: filteredAdults.filter(a => a.role === 'leadership' && a.present) },
      { label: '👥 צוות מחנה',           items: filteredAdults.filter(a => a.role === 'staff' && a.present).concat(filteredStaff) },
    ];
    document.getElementById('reg-adults').innerHTML = groups.map(g => {
      if (g.items.length === 0) return '';
      return `
        <div style="padding: 8px 10px; background: var(--bg-elev); border-radius: var(--r-sm); margin-bottom: 6px;">
          <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 6px;">
            <strong style="font-family: var(--font-ui); font-size: 12px;">${g.label}</strong>
            <span style="flex:1;"></span>
            <span class="chip" style="font-size: 10px;">${g.items.length}</span>
          </div>
          ${g.items.map(a => `
            <div style="display: flex; align-items: center; gap: 6px; padding: 3px 4px; font-size: 12px;">
              <span style="flex:1;">${util.escapeHtml(a.name)}</span>
              ${a.role ? '<span style="color: var(--text-mid); font-size: 10px;">' + util.escapeHtml(UI.ROLE_LABELS[a.role] || a.role) + '</span>' : ''}
            </div>`).join('')}
        </div>`;
    }).join('') || '<div style="color: var(--text-low); padding: 14px; text-align: center;">אין מבוגרים נוכחים שתואמים את החיפוש.</div>';
  }

  // ====== Registry: pending approvals (multi-channel) ======
  function listPendingItems() {
    const exc = (ScoutDB.get('gateExceptions', []) || []).filter(x => !x.resolved).map(x => Object.assign({}, x, { _kind: 'exception' }));
    const pickups = (ScoutDB.get('parentPickups', []) || []).filter(p => p.stage === 'hq-pending').map(p => Object.assign({}, p, { _kind: 'pickup' }));
    const verifs = (ScoutDB.get('checkoutVerifications', []) || []).filter(v => v.status === 'pending').map(v => Object.assign({}, v, { _kind: 'verify' }));
    return exc.concat(pickups).concat(verifs).sort((a, b) => (b.ts || 0) - (a.ts || 0));
  }
  function renderPendingRegistry() {
    const items = listPendingItems();
    const el = document.getElementById('reg-pending');
    if (items.length === 0) {
      el.innerHTML = '<div style="color: var(--text-low); padding: 14px; text-align: center;">אין בקשות ממתינות.</div>';
      return;
    }
    el.innerHTML = items.map(it => {
      if (it._kind === 'exception') {
        const isSupplier = it.entityType === 'supplier';
        const deptChip = isSupplier && it.data && it.data.destination ? `<span class="chip chip--info" style="font-size: 10px;">${util.escapeHtml(it.data.destination)}</span>` : '';
        return `
          <div style="padding: 8px 10px; background: rgba(255,181,71,0.08); border: 1px solid rgba(255,181,71,0.3); border-radius: var(--r-sm); margin-bottom: 6px;">
            <div style="display: flex; align-items: center; gap: 6px;">
              <span style="font-weight: 700; font-size: 12px;">⚠ ${isSupplier ? '🚚' : it.entityType === 'guest' ? '🎫' : '👥'} ${util.escapeHtml(it.plate || it.data && it.data.name || 'חריג')}</span>
              <span style="flex:1;"></span>
              ${deptChip}
            </div>
            <div style="font-size: 11px; color: var(--text-mid); margin: 4px 0;">${util.escapeHtml(it.reason || '')}</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px;">
              <button class="btn btn--sm btn--ok" data-exc-approve="${it.id}">אשר</button>
              <button class="btn btn--sm btn--danger" data-exc-deny="${it.id}">דחה</button>
            </div>
          </div>`;
      }
      if (it._kind === 'pickup') {
        return `
          <div style="padding: 8px 10px; background: rgba(91,141,239,0.10); border: 1px solid rgba(91,141,239,0.4); border-radius: var(--r-sm); margin-bottom: 6px;">
            <div style="font-weight: 700; font-size: 12px;">👨‍👧 איסוף הורה</div>
            <div style="font-size: 11px; color: var(--text-mid); margin: 4px 0;">${util.escapeHtml(it.parentName)} (${util.escapeHtml(it.parentPhone)}) → אסיפת <strong>${util.escapeHtml(it.hanichName)}</strong></div>
            <button class="btn btn--sm btn--primary btn--block" data-pickup-route="${it.id}">⤴ נתב למרכז שבט לאימות</button>
          </div>`;
      }
      if (it._kind === 'verify') {
        const isShift = persona.role === 'hq-shift';
        return `
          <div style="padding: 8px 10px; background: rgba(255,71,87,0.10); border: 1px solid rgba(255,71,87,0.4); border-radius: var(--r-sm); margin-bottom: 6px;">
            <div style="font-weight: 700; font-size: 12px;">🔴 בקשת אימות מש"ג (Track B)</div>
            <div style="font-size: 11px; color: var(--text-mid); margin: 4px 0;">${util.escapeHtml(it.hanichName)} — ${util.escapeHtml(it.reason)}</div>
            ${isShift
              ? `<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px;">
                  <button class="btn btn--sm btn--ok" data-verify-approve="${it.id}">אשר אימות</button>
                  <button class="btn btn--sm btn--danger" data-verify-deny="${it.id}">דחה</button>
                </div>`
              : `<div style="font-size: 11px; color: var(--warn); text-align: center; padding: 4px;">🔒 אישור סופי נדרש מאחראי חמ"ל (shift)</div>`}
          </div>`;
      }
      return '';
    }).join('');
  }

  // ===== Tabs =====
  document.querySelectorAll('.reg-tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.reg-tab').forEach(x => {
        x.classList.remove('is-active');
        x.style.background = 'transparent';
        x.style.color = 'var(--text-mid)';
      });
      t.classList.add('is-active');
      t.style.background = 'var(--accent)';
      t.style.color = '#06121A';
      document.querySelectorAll('.reg-pane').forEach(p => p.hidden = true);
      document.getElementById('reg-' + t.dataset.regTab).hidden = false;
    });
  });
  // Set initial active tab styling
  document.querySelector('.reg-tab.is-active').style.background = 'var(--accent)';
  document.querySelector('.reg-tab.is-active').style.color = '#06121A';

  // ===== Search =====
  document.getElementById('registry-search').addEventListener('input', () => {
    renderHanichimRegistry(); renderAdultsRegistry();
  });

  // ===== Click handlers =====
  document.addEventListener('click', e => {
    const t = e.target;
    if (t.dataset.excApprove || t.dataset.excDeny) {
      const id = t.dataset.excApprove || t.dataset.excDeny;
      const ok = !!t.dataset.excApprove;
      ScoutDB.patch('gateExceptions', list => list.map(x => x.id === id ? Object.assign({}, x, { resolved: true, decision: ok ? 'approved' : 'denied', decidedAt: util.nowMs(), decidedBy: persona.name }) : x));
      Bus.emit('bus:gate-exception:resolved', { id, decision: ok ? 'approved' : 'denied' });
      ScoutDB.appendAudit({ action: ok ? 'GATE-APPROVE' : 'GATE-DENY', channel: 'gate', details: `בקשה ${id} ע"י ${persona.name} (חמ"ל)` });
      Toast.show(ok ? 'אושר. נשלח לשער.' : 'נדחה. נשלח לשער.', { kind: ok ? 'ok' : 'warn' });
      renderPendingRegistry(); renderRegistryStats();
    }
    if (t.dataset.pickupRoute) {
      Scout.ParentPickup.routeToTribe(t.dataset.pickupRoute);
      Toast.show('הבקשה נותבה למרכז השבט לאימות מול המשפחה.', { kind: 'ok' });
      renderPendingRegistry();
    }
    if (t.dataset.verifyApprove || t.dataset.verifyDeny) {
      const id = t.dataset.verifyApprove || t.dataset.verifyDeny;
      const dec = t.dataset.verifyApprove ? 'approved' : 'denied';
      Scout.Checkout.resolveGateVerification(id, dec);
      // If approved, also mark the hanich for checkout
      if (dec === 'approved') {
        const vr = (ScoutDB.get('checkoutVerifications', []) || []).find(v => v.id === id);
        // Find hanich by name (approximate match)
        const h = (ScoutDB.get('hanichim', []) || []).find(x => x.name === vr.hanichName);
        if (h) Scout.Checkout.approveByHQ(h.id, { reason: 'Track B — אומת אצל אחראי חמ"ל', paperRef: 'אימות-' + id.slice(-4) });
      }
      Toast.show(dec === 'approved' ? 'אומת. השער יכול לשחרר.' : 'נדחה.', { kind: dec === 'approved' ? 'ok' : 'warn' });
      renderPendingRegistry(); renderRegistryStats();
    }
  });

  // ===== Approve checkout (HQ-initiated) =====
  document.getElementById('btn-approve-checkout').addEventListener('click', () => {
    const tribes = ScoutDB.get('tribes', []).filter(t => t.forestId === forestId);
    const tribeIds = tribes.map(t => t.id);
    const eligible = ScoutDB.get('hanichim', [])
      .filter(h => tribeIds.includes(h.tribeId) && h.status === 'present' && !h.checkoutApproved);
    if (eligible.length === 0) { Toast.show('אין חניכים זמינים לאישור.', { kind: 'warn' }); return; }
    const host = document.createElement('div');
    host.className = 'modal-host';
    host.innerHTML = `
      <form class="modal" style="width: min(540px, 92vw);">
        <h3>📤 אישור יציאת חניך</h3>
        <p style="color: var(--text-mid); margin: 0 0 14px;">סמכות חמ"ל בלעדית. הקליד תיווצר טופס נייר עם מספר מעקב — הכוון את החניך לשער.</p>
        <div class="form-field">
          <label>בחר חניך *</label>
          <select class="select" name="hanichId" required>
            <option value="" disabled selected>— בחר —</option>
            ${eligible.map(h => {
              const t = tribes.find(tr => tr.id === h.tribeId);
              return `<option value="${h.id}">${util.escapeHtml(h.name)} · שבט ${util.escapeHtml(t ? t.name : '')}</option>`;
            }).join('')}
          </select>
        </div>
        <div class="form-field">
          <label>סיבת היציאה *</label>
          <input class="input" name="reason" required placeholder="למשל: הורה מאסף לפגישה רפואית">
        </div>
        <div style="display:flex; gap:10px; justify-content:flex-end; margin-top: 14px;">
          <button type="button" class="btn btn--ghost" data-cancel>ביטול</button>
          <button type="submit" class="btn btn--primary">אשר ויצור טופס נייר</button>
        </div>
      </form>
    `;
    document.body.appendChild(host);
    const form = host.querySelector('form');
    host.querySelector('[data-cancel]').addEventListener('click', () => host.remove());
    host.addEventListener('click', e => { if (e.target === host) host.remove(); });
    form.addEventListener('submit', e => {
      e.preventDefault();
      const r = Scout.Checkout.approveByHQ(form.hanichId.value, { reason: form.reason.value.trim() });
      if (!r.ok) { Toast.show(r.error, { kind: 'warn' }); return; }
      const h = ScoutDB.get('hanichim', []).find(x => x.id === form.hanichId.value);
      Toast.show(`✓ ${h.name} מאושר ליציאה. טופס פיזי: ${h.checkoutPaperRef}`, { kind: 'ok' });
      Scout.Audio.play('blip');
      host.remove();
      renderHanichimRegistry(); renderRegistryStats();
    });
  });

  // Events log strip
  function renderEvents() {
    const log = ScoutDB.get('audit', []).slice(-5).reverse();
    document.getElementById('events').innerHTML = log.map(e =>
      `<li><span class="ts">${util.fmtTime(e.ts)}</span><strong>${util.escapeHtml(e.action)}</strong> — ${util.escapeHtml(e.details || '')}</li>`
    ).join('');
  }

  // ===== Leaflet map =====
  Geo.seed(forestId);
  Geo.start(forestId);
  const map = L.map('map', { zoomControl: true, attributionControl: true }).setView([forest.lat, forest.lng], 15);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19,
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> · <a href="https://carto.com/attributions">CARTO</a>',
  }).addTo(map);

  // Forest "boundary" polygon (artistic)
  const r = 0.012;
  L.polygon([
    [forest.lat + r, forest.lng - r * 0.5],
    [forest.lat + r * 0.5, forest.lng + r],
    [forest.lat - r * 0.7, forest.lng + r * 0.8],
    [forest.lat - r, forest.lng - r * 0.3],
    [forest.lat - r * 0.3, forest.lng - r],
  ], { color: '#4DD0E1', weight: 1.5, fillColor: '#4DD0E1', fillOpacity: 0.05, dashArray: '6,6' }).addTo(map);

  const ICONS = {
    patrol:     L.divIcon({ className: '', html: '<div class="marker-pin patrol">P</div>', iconSize: [28, 28], iconAnchor: [14, 14] }),
    medic:      L.divIcon({ className: '', html: '<div class="marker-pin medic">+</div>', iconSize: [28, 28], iconAnchor: [14, 14] }),
    logistics:  L.divIcon({ className: '', html: '<div class="marker-pin logistics">L</div>', iconSize: [28, 28], iconAnchor: [14, 14] }),
    commander:  L.divIcon({ className: '', html: '<div class="marker-pin commander">★</div>', iconSize: [28, 28], iconAnchor: [14, 14] }),
    gate:       L.divIcon({ className: '', html: '<div class="marker-pin gate">⛩</div>', iconSize: [28, 28], iconAnchor: [14, 14] }),
  };

  const markers = {};
  function refreshMarkers() {
    Geo.snapshot().forEach(ent => {
      if (!markers[ent.id]) {
        markers[ent.id] = L.marker([ent.lat, ent.lng], { icon: ICONS[ent.role] || ICONS.patrol })
          .bindPopup(`<strong>${ent.label}</strong><br><span style="font-size:11px; color:#888;">${ent.role}</span>`)
          .addTo(map);
      } else {
        markers[ent.id].setLatLng([ent.lat, ent.lng]);
      }
    });
  }
  refreshMarkers();
  Bus.on('geo:tick', refreshMarkers);

  // Mass broadcast
  document.getElementById('btn-broadcast').addEventListener('click', () => {
    const text = prompt('הזן טקסט לכריזה המונית:', 'התרעה: סבב נוכחות בעוד 5 דקות');
    if (!text) return;
    Bus.emit('bus:broadcast', { text, ts: util.nowMs() });
    Scout.Audio.play('voice-prompt', { text });
    ScoutDB.appendAudit({ action: 'BROADCAST', channel: 'comms', details: text });
    Toast.show('כריזה נשלחה לכלל המכשירים', { kind: 'warn' });
    renderEvents();
  });

  // Real-time wiring — HQ is "watching eye": sees everything, manages registry
  Bus.on('bus:gate-exception', () => { renderPendingRegistry(); renderRegistryStats(); });
  Bus.on('bus:gate-exception:resolved', () => { renderPendingRegistry(); renderRegistryStats(); });
  Bus.on('bus:medical:new', () => { renderRegistryStats(); renderHanichimRegistry(); });
  Bus.on('parentPickup:request', () => { renderPendingRegistry(); renderRegistryStats(); Scout.Audio.play('echo-bell'); Toast.show('🚨 בקשת איסוף הורה הגיעה מהשער', { kind: 'warn' }); });
  Bus.on('parentPickup:routed',  () => { renderPendingRegistry(); });
  Bus.on('parentPickup:decision', payload => { renderPendingRegistry(); renderRegistryStats(); Toast.show(`מרכז שבט ${payload.stage === 'tribe-approved' ? 'אישר' : 'דחה'} איסוף ${payload.hanichName}`, { kind: payload.stage === 'tribe-approved' ? 'ok' : 'warn' }); });
  Bus.on('checkout:verify-request', () => { renderPendingRegistry(); Scout.Audio.play('pulse-alert'); Toast.show('🔴 בקשת אימות חניך מהש"ג (Track B)', { kind: 'danger' }); });
  Bus.on('checkout:verify-resolved', () => { renderPendingRegistry(); });
  Bus.on('checkout:approved', () => { renderHanichimRegistry(); renderRegistryStats(); });
  Bus.on('checkout:released', () => { renderHanichimRegistry(); renderRegistryStats(); });
  Bus.on('audit:append', renderEvents);

  // Inbound incident alert — top-floating, non-blocking (read-only for HQ)
  Bus.on('incident:new', inc => {
    Scout.Audio.play('pulse-alert');
    document.querySelectorAll('.incident-alert-banner').forEach(b => b.remove());
    const banner = document.createElement('div');
    banner.className = 'incident-alert-banner' + (inc.priority === 'high' ? ' is-critical' : '');
    banner.innerHTML = `
      <div class="ia-head">
        <span>⚠ אזעקה נכנסה: ${util.escapeHtml(inc.title)}</span>
        <span style="flex:1;"></span>
        <span class="chip" style="font-size: 10px; background: ${inc.priority === 'high' ? 'var(--danger)' : 'var(--warn)'}; color: #fff; border-color: transparent;">${Scout.Incidents.PRIORITY_LABELS[inc.priority]}</span>
      </div>
      <div class="ia-meta">${util.escapeHtml(Scout.Incidents.TYPE_LABELS[inc.type] || inc.type)} · ${util.escapeHtml(inc.reporter)} · ${util.fmtTime(inc.ts)}${inc.gps ? ' · 📍 ' + inc.gps.lat.toFixed(4) + ',' + inc.gps.lng.toFixed(4) : ''}</div>
      <div class="ia-actions">
        <button class="btn btn--sm" data-action="ignore">התעלם / סגור</button>
        <span style="display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text-mid);">🔒 ניהול אצל קב"ט</span>
      </div>
    `;
    document.body.appendChild(banner);
    banner.addEventListener('click', e => {
      if (e.target.closest('[data-action="ignore"]')) banner.remove();
    });
    setTimeout(() => { if (banner.parentNode) { banner.style.opacity = '0'; banner.style.transition = 'opacity 400ms'; setTimeout(() => banner.remove(), 450); } }, 20000);
  });
  Bus.on('personnel:update', () => { renderRegistryStats(); renderAdultsRegistry(); });

  // HQ sees SOS as a passive observer — banner only, NOT a lockdown.
  // Security incident management is exclusively Kabat's authority.
  UI.bindGlobalSOS({ lock: false });

  // Initial render
  renderRegistryStats();
  renderHanichimRegistry();
  renderAdultsRegistry();
  renderPendingRegistry();
  renderEvents();
})();
</script>
</body>
</html>

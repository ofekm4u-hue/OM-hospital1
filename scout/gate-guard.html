<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>שו"ב | מאבטח ש"ג</title>
<link rel="stylesheet" href="shared/tokens.css">
<style>
  .gate-wrap {
    padding: 12px;
    display: grid;
    grid-template-columns: 220px minmax(0, 1fr);
    gap: 12px;
    min-height: calc(100vh - var(--header-h));
  }
  @media (max-width: 820px) {
    .gate-wrap { grid-template-columns: 1fr; }
    .gate-tabs { display: flex !important; overflow-x: auto; }
    .gate-tab { flex: none; }
  }

  .gate-tabs {
    display: grid;
    gap: 8px;
    align-content: start;
  }
  .gate-tab {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 14px;
    cursor: pointer;
    transition: all var(--t-fast);
    text-align: right;
    font-family: var(--font-ui);
  }
  .gate-tab:hover { border-color: var(--accent); }
  .gate-tab.is-active {
    background: var(--bg-elev-2);
    border-color: var(--accent);
    box-shadow: inset 4px 0 0 var(--accent);
  }
  .gate-tab .tab-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .gate-tab .tab-meta { font-size: 11px; color: var(--text-mid); }
  .gate-tab .tab-count {
    display: inline-block;
    margin-top: 6px;
    padding: 2px 8px;
    background: var(--bg-deep);
    border-radius: var(--r-pill);
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
  }

  .gate-content {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 16px;
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .gate-toolbar {
    display: flex; gap: 8px; align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .vehicle-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 12px 14px;
    display: flex;
    gap: 14px;
    align-items: center;
  }
  .vehicle-card + .vehicle-card { margin-top: 8px; }
  .vehicle-plate {
    background: var(--bg-deep);
    color: var(--accent);
    font-family: var(--font-mono);
    font-weight: 700;
    padding: 8px 12px;
    border-radius: var(--r-sm);
    border: 1px solid var(--border);
    font-size: 16px;
    letter-spacing: .05em;
    min-width: 130px;
    text-align: center;
  }
  .vehicle-card .info { flex: 1; }
  .vehicle-card .driver { font-weight: 700; }
  .vehicle-card .vendor { color: var(--text-mid); font-size: 12px; }

  .scan-banner {
    background: var(--bg-elev);
    border: 1px dashed var(--border-hi);
    border-radius: var(--r-md);
    padding: 18px;
    text-align: center;
    margin-bottom: 14px;
  }
  .scan-banner h3 { margin-bottom: 6px; }
  .scan-banner.is-blacklist {
    background: rgba(255,71,87,0.10);
    border-color: var(--danger);
    color: var(--danger);
    animation: blink-danger 0.8s infinite;
  }

  .bus-row {
    display: grid;
    grid-template-columns: 100px 1fr auto auto;
    gap: 10px;
    align-items: center;
    padding: 10px 12px;
    background: var(--bg-elev);
    border-radius: var(--r-sm);
    margin-bottom: 6px;
  }
  .bus-status {
    padding: 4px 10px;
    border-radius: var(--r-pill);
    font-size: 11px;
    font-weight: 700;
    font-family: var(--font-ui);
    color: white;
  }
  .bus-status.planned { background: var(--bus-planned); }
  .bus-status.waiting { background: var(--bus-waiting); color: #1a0e00; }
  .bus-status.cleared { background: var(--bus-cleared); color: #052817; }
  .bus-status.inside  { background: var(--bus-inside); }
  .bus-status.left    { background: var(--bus-left); }

  /* ===== Mobile-first universal SOS button ===== */
  .sos-fab {
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    width: 84px;
    height: 84px;
    border-radius: 50%;
    background: var(--danger);
    border: 3px solid #fff;
    box-shadow: 0 0 0 4px rgba(255,71,87,0.25), 0 16px 40px rgba(255,71,87,0.5);
    color: #fff;
    font-family: var(--font-ui);
    font-weight: 800;
    font-size: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    cursor: pointer;
    z-index: 100;
    user-select: none;
    -webkit-touch-callout: none;
    transition: transform 120ms ease, background 120ms;
    animation: sos-idle-pulse 2.4s infinite;
  }
  @keyframes sos-idle-pulse {
    0%, 100% { box-shadow: 0 0 0 4px rgba(255,71,87,0.25), 0 16px 40px rgba(255,71,87,0.5); }
    50%      { box-shadow: 0 0 0 8px rgba(255,71,87,0.35), 0 20px 50px rgba(255,71,87,0.7); }
  }
  .sos-fab.arming {
    background: #ff1a2e;
    transform: translateX(-50%) scale(1.08);
    animation: none;
  }
  .sos-fab.fired {
    background: #ffd400;
    color: #2d0306;
    animation: none;
  }
  .sos-fab .sos-icon { font-size: 26px; line-height: 1; }
  .sos-fab .sos-hint {
    font-size: 9px;
    font-weight: 600;
    opacity: 0.85;
    letter-spacing: 0.04em;
    text-align: center;
    line-height: 1;
  }
  .sos-ring {
    position: absolute;
    inset: -10px;
    pointer-events: none;
  }
  .sos-ring circle {
    fill: none;
    stroke: var(--accent);
    stroke-width: 6;
    transform: rotate(-90deg);
    transform-origin: 50% 50%;
    stroke-linecap: round;
    stroke-dasharray: 0 295;
    transition: stroke-dasharray 80ms linear;
  }
  .sos-fab.arming .sos-ring circle { stroke: #fff; }

  /* SOS fired state (after long-press) */
  .sos-fired-screen {
    position: fixed;
    inset: 0;
    background: rgba(120, 0, 8, 0.88);
    z-index: 1600;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    animation: blink-danger 0.7s infinite;
  }
  .sos-fired-screen h2 {
    color: #fff;
    font-size: 28px;
    margin-bottom: 8px;
    text-align: center;
  }
  .sos-fired-screen p {
    color: rgba(255,255,255,0.85);
    margin: 0 0 18px;
    text-align: center;
    max-width: 320px;
  }
  .sos-fired-screen .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: min(360px, 90vw);
  }

  /* ===== Chat FAB + Slide-up sheet ===== */
  .chat-fab {
    position: fixed;
    bottom: 32px;
    right: 18px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid #fff;
    color: #06121A;
    font-size: 22px;
    box-shadow: 0 10px 28px rgba(77,208,225,0.45);
    cursor: pointer;
    z-index: 99;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .chat-fab .unread {
    position: absolute;
    top: -4px;
    right: -4px;
    background: var(--warn);
    color: #1a0e00;
    font-size: 10px;
    font-weight: 800;
    padding: 2px 6px;
    border-radius: 999px;
    border: 2px solid var(--bg-deep);
    min-width: 18px;
    text-align: center;
  }
  .chat-fab[hidden] { display: none; }

  .chat-sheet {
    position: fixed;
    bottom: 0;
    right: 0;
    left: 0;
    height: 75vh;
    max-height: 720px;
    background: var(--bg-panel);
    border-top: 2px solid var(--accent);
    border-radius: 18px 18px 0 0;
    box-shadow: 0 -16px 60px rgba(0,0,0,0.5);
    z-index: 101;
    display: grid;
    grid-template-rows: auto 1fr auto;
    transform: translateY(100%);
    transition: transform 280ms cubic-bezier(.2,.7,.2,1);
  }
  .chat-sheet.is-open { transform: translateY(0); }
  .chat-sheet-head {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .chat-sheet-head .grab {
    width: 40px;
    height: 4px;
    background: var(--border-hi);
    border-radius: 2px;
    margin: 0 auto;
    position: absolute;
    top: 6px;
    left: 0; right: 0;
  }
  .chat-sheet .channel-row {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-soft);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .chat-sheet .channel-row:hover { background: var(--bg-elev); }
  .chat-sheet .channel-row.is-active {
    background: var(--bg-elev);
    border-right: 3px solid var(--accent);
  }
  .chat-sheet .channel-name { font-weight: 700; font-family: var(--font-ui); }
  .chat-sheet .channel-meta { color: var(--text-mid); font-size: 11px; }
  .chat-sheet-msgs {
    overflow-y: auto;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .chat-sheet .bubble {
    max-width: 78%;
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 14px;
  }
  .chat-sheet .bubble--me     { align-self: flex-start; background: rgba(77,208,225,0.10); border: 1px solid rgba(77,208,225,0.3); border-top-right-radius: 4px; }
  .chat-sheet .bubble--other  { align-self: flex-end; background: var(--bg-elev); border: 1px solid var(--border); border-top-left-radius: 4px; }
  .chat-sheet .bubble--system { align-self: center; background: rgba(91,141,239,0.08); border: 1px dashed rgba(91,141,239,0.3); color: var(--info); font-size: 12px; text-align: center; }
  .chat-sheet .bubble .meta { display: block; font-size: 10px; color: var(--text-mid); margin-bottom: 3px; }
  .chat-sheet .bubble .meta .role { color: var(--accent); font-weight: 700; margin-right: 4px; }
  .chat-sheet .bubble .ts { font-size: 9px; color: var(--text-low); margin-top: 2px; display: block; }
  .chat-sheet-compose {
    border-top: 1px solid var(--border);
    background: var(--bg-elev);
    padding: 10px 12px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
  }
  .chat-sheet-compose input { padding: 10px 14px; }

  /* Reserve space at bottom so content isn't hidden behind SOS button */
  .gate-content, .patrol-view { padding-bottom: 130px !important; }

  /* ===== Live search bar (gate-guard) =====*/
  .gate-search {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 8px 12px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .gate-search input {
    flex: 1;
    background: var(--bg-deep);
    color: var(--text-hi);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    padding: 8px 12px;
    font: inherit;
  }
  .gate-search .lbl {
    color: var(--text-mid);
    font-family: var(--font-ui);
    font-size: 12px;
    font-weight: 700;
  }
</style>
</head>
<body class="tactical-grid">
  <div id="header"></div>

  <div class="gate-wrap">
    <nav class="gate-tabs">
      <button class="gate-tab is-active" data-tab="suppliers">
        <div class="tab-title">🚚 ספקים</div>
        <div class="tab-meta">רכבי אספקה מאושרים</div>
        <span class="tab-count" data-count="suppliers">—</span>
      </button>
      <button class="gate-tab" data-tab="buses">
        <div class="tab-title">🚌 אוטובוסים</div>
        <div class="tab-meta">מסונכרן עם חמ"ל</div>
        <span class="tab-count" data-count="buses">—</span>
      </button>
      <button class="gate-tab" data-tab="staff">
        <div class="tab-title">👥 צוות מחנה</div>
        <div class="tab-meta">צוות והנהגה רשמית</div>
        <span class="tab-count" data-count="staff">—</span>
      </button>
      <button class="gate-tab" data-tab="guests">
        <div class="tab-title">🎫 אורחים מאושרים</div>
        <div class="tab-meta">מבקרים בתיאום קב"ט</div>
        <span class="tab-count" data-count="guests">—</span>
      </button>
      <button class="gate-tab" data-tab="checkouts">
        <div class="tab-title">🚪 יציאת חניכים</div>
        <div class="tab-meta">סמכות חמ"ל בלבד</div>
        <span class="tab-count" data-count="checkouts">—</span>
      </button>
      <button class="gate-tab" data-tab="exceptions">
        <div class="tab-title">⚠ אישורים חריגים</div>
        <div class="tab-meta">ממתינים לקב"ט</div>
        <span class="tab-count" data-count="exceptions">—</span>
      </button>
      <div style="margin-top: 12px; padding: 12px; background: var(--bg-elev); border-radius: var(--r-md); border: 1px dashed var(--border);">
        <div style="font-family: var(--font-ui); font-weight: 700; font-size: 13px; margin-bottom: 8px;">📷 סורק תעודות</div>
        <button class="btn btn--primary btn--block" id="btn-scan">סרוק תעודת זהות</button>
        <button class="btn btn--block" id="btn-request-exception" style="margin-top: 6px;">בקש אישור חריג</button>
      </div>
    </nav>

    <main class="gate-content">
      <!-- Live search bar (gate-mode only) -->
      <div class="gate-search" id="gate-search" hidden>
        <span class="lbl">🔍</span>
        <input id="gate-search-input" type="search" placeholder="חפש שם, מספר רכב, או שם חברה..." autocomplete="off">
        <span class="chip" id="gate-search-hint" hidden>0 תוצאות</span>
      </div>

      <!-- Scan banner -->
      <div class="scan-banner" id="scan-banner" hidden></div>

      <!-- Tab panes -->
      <section data-pane="suppliers"></section>
      <section data-pane="buses" hidden></section>
      <section data-pane="staff" hidden></section>
      <section data-pane="guests" hidden></section>
      <section data-pane="checkouts" hidden></section>
      <section data-pane="exceptions" hidden></section>
    </main>
  </div>

  <!-- ===== Universal SOS button (always visible) ===== -->
  <button class="sos-fab" id="universal-sos" type="button" aria-label="לחצן מצוקה — לחץ והחזק 3 שניות">
    <svg class="sos-ring" viewBox="0 0 100 100" width="104" height="104">
      <circle cx="50" cy="50" r="47" />
    </svg>
    <span class="sos-icon">🚨</span>
    <span class="sos-label">SOS</span>
    <span class="sos-hint">החזק 3 שניות</span>
  </button>

  <!-- ===== Chat FAB ===== -->
  <button class="chat-fab" id="chat-fab" type="button" aria-label="פתח צ׳אט">
    💬
    <span class="unread" id="chat-fab-unread" hidden>0</span>
  </button>

  <!-- ===== Chat slide-up sheet ===== -->
  <div class="chat-sheet" id="chat-sheet" role="dialog" aria-modal="true">
    <div class="chat-sheet-head">
      <div class="grab"></div>
      <h3 style="font-size: 16px; margin: 0;" id="chat-sheet-title">צ׳אט מבצעי</h3>
      <span class="chip chip--info" id="chat-sheet-meta" style="font-size: 11px;">—</span>
      <span style="flex:1;"></span>
      <button class="btn btn--sm btn--ghost" id="chat-sheet-back" hidden>← ערוצים</button>
      <button class="btn btn--sm btn--ghost" id="chat-sheet-close">✕</button>
    </div>
    <div class="chat-sheet-msgs" id="chat-sheet-body">
      <!-- Channels list OR messages -->
    </div>
    <form class="chat-sheet-compose" id="chat-sheet-compose" hidden>
      <input class="input" name="msg" placeholder="הקלד הודעה..." autocomplete="off">
      <button type="submit" class="btn btn--primary btn--sm">שלח ➤</button>
    </form>
  </div>

<script src="shared/engine.js"></script>
<script>
(function () {
  'use strict';
  const { ScoutDB, Bus, UI, SOS, Toast, util, DMS, Auth } = Scout;

  if (!Auth.requireLogin()) return;

  // ===== Mission picker (unified security role) =====
  const persona = UI.currentPersona();
  let currentMission = UI.isSecurityRole(persona.role) ? UI.getMission(persona.staffId) : null;

  function showMissionPicker(opts) {
    opts = opts || {};
    return new Promise(resolve => {
      const host = document.createElement('div');
      host.className = 'modal-host';
      host.innerHTML = `
        <div class="modal" style="width: min(520px, 92vw); text-align: center;">
          <div style="color: var(--accent); font-family: var(--font-ui); font-weight: 800; letter-spacing: .14em; text-transform: uppercase; font-size: 12px; margin-bottom: 4px;">${opts.title || 'בחר משימה למשמרת זו'}</div>
          <h2 style="margin: 4px 0 6px;">מערך אבטחה אחוד</h2>
          <p style="color: var(--text-mid); margin: 0 0 22px; font-size: 13px;">המאבטח הוא יישות אחת. בחר במשימה הנוכחית — ניתן להחליף במהלך המשמרת.</p>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <button class="btn btn--lg" data-mission="gate" style="height: 110px; display: flex; flex-direction: column; gap: 6px;">
              <span style="font-size: 32px;">⛩</span>
              <span style="font-family: var(--font-ui); font-weight: 700; font-size: 16px;">ש"ג (שער)</span>
              <span style="font-size: 11px; color: var(--text-mid); font-weight: 400;">טבלאות רכבים, סורק תעודות, אישורים</span>
            </button>
            <button class="btn btn--lg" data-mission="patrol" style="height: 110px; display: flex; flex-direction: column; gap: 6px;">
              <span style="font-size: 32px;">🚶</span>
              <span style="font-family: var(--font-ui); font-weight: 700; font-size: 16px;">סיור (שטח)</span>
              <span style="font-size: 11px; color: var(--text-mid); font-weight: 400;">נקודות ציון, צ׳ק-ליסט סבב, דיווח מפגעים</span>
            </button>
          </div>
          ${opts.allowCancel ? '<div style="margin-top: 14px;"><button class="btn btn--ghost btn--sm" data-cancel>ביטול</button></div>' : ''}
        </div>
      `;
      document.body.appendChild(host);
      host.addEventListener('click', e => {
        if (e.target.dataset.cancel) { host.remove(); resolve(null); return; }
        const btn = e.target.closest('[data-mission]');
        if (!btn) return;
        const m = btn.dataset.mission;
        if (persona.staffId) UI.setMission(persona.staffId, m);
        currentMission = m;
        host.remove();
        resolve(m);
      });
    });
  }

  function applyMissionLayout() {
    // Layout differences:
    // - Gate mission: suppliers/buses/staff/guests/exceptions tabs visible
    // - Patrol mission: only patrol-relevant content
    const gateTabIds = ['suppliers', 'buses', 'staff', 'guests', 'exceptions'];
    if (currentMission === 'patrol') {
      // Hide tabs and show patrol view
      document.querySelector('.gate-tabs').style.display = 'none';
      document.querySelector('.gate-content').innerHTML = renderPatrolView();
      bindPatrolView();
    } else {
      document.querySelector('.gate-tabs').style.display = '';
      // Restore the gate panes (they're static in HTML; if patrol was rendered we'd need to restore)
      // For initial load, the panes are already there.
    }
  }

  // Determine if persona needs mission picker
  const needsPicker = UI.isSecurityRole(persona.role) && !currentMission;

  document.getElementById('header').innerHTML = UI.header({
    title: currentMission === 'patrol' ? 'מאבטח — משמרת סיור' : 'מאבטח — משמרת ש"ג',
    subtitle: persona.staffId && currentMission ? (currentMission === 'gate' ? '⛩ ש"ג' : '🚶 סיור') : null,
  });
  UI.bindHeader(document.body);
  UI.mockBadge('דמו פרזנטציה');

  // Add mission-switch button to header for security personas
  if (UI.isSecurityRole(persona.role)) {
    const switchBtn = document.createElement('button');
    switchBtn.className = 'btn btn--sm';
    switchBtn.style.cssText = 'margin: 0 6px;';
    switchBtn.textContent = '🔄 החלף משימה';
    switchBtn.title = 'החלף בין ש"ג לסיור באמצע המשמרת';
    switchBtn.addEventListener('click', async () => {
      const m = await showMissionPicker({ title: 'החלפת משימה', allowCancel: true });
      if (m) {
        Toast.show(`המשימה הוחלפה ל-${m === 'gate' ? 'ש"ג' : 'סיור'}`, { kind: 'ok' });
        setTimeout(() => location.reload(), 500);
      }
    });
    const headerEl = document.querySelector('.header');
    const logoutBtn = headerEl.querySelector('[data-logout]');
    if (logoutBtn) headerEl.insertBefore(switchBtn, logoutBtn);
    else headerEl.appendChild(switchBtn);
  }

  if (needsPicker) {
    showMissionPicker().then(() => location.reload());
    return;
  }

  // Allow URL flag to demo DMS quickly
  if (util.getParam('dms') === 'on') {
    DMS.start({ force: true });
    Toast.show('Dead-Man Switch מופעל במצב דמו (פופ-אפ בעוד 4 שניות)', { kind: 'warn' });
  }

  // Tabs
  const tabs = document.querySelectorAll('.gate-tab[data-tab]');
  tabs.forEach(t => t.addEventListener('click', () => {
    tabs.forEach(x => x.classList.remove('is-active'));
    t.classList.add('is-active');
    document.querySelectorAll('[data-pane]').forEach(p => p.hidden = p.dataset.pane !== t.dataset.tab);
  }));

  // Helpers
  const banner = document.getElementById('scan-banner');
  function showBanner(html, kind) {
    banner.hidden = false;
    banner.className = 'scan-banner' + (kind === 'danger' ? ' is-blacklist' : '');
    banner.innerHTML = html;
    setTimeout(() => banner.hidden = true, 5500);
  }

  // ----- Suppliers -----
  function renderSuppliers() {
    const list = ScoutDB.get('vehicles', []);
    const html = `
      <div class="gate-toolbar">
        <h2 style="font-family: var(--font-ui);">רכבי ספקים מאושרים</h2>
        <span class="chip">${list.length} רכבים</span>
        <span style="flex:1;"></span>
        <span class="chip chip--ok">פילטר ירוק אוטומטי בשער</span>
      </div>
      ${list.map(v => `
        <div class="vehicle-card">
          <div class="vehicle-plate">${util.escapeHtml(v.plate)}</div>
          <div class="info">
            <div class="driver">${util.escapeHtml(v.driver)}</div>
            <div class="vendor">${util.escapeHtml(v.vendor)}${v.addedByKabat ? ' <span class="chip" style="background: rgba(91,141,239,0.18); color: var(--info); border-color: transparent;">הוסף ע״י קב״ט</span>' : ''}</div>
          </div>
          ${v.arrived
            ? '<span class="chip chip--info">בתוך המחנה</span>'
            : `<button class="btn btn--ok" data-mark-in="${v.id}">אשר כניסה</button>`}
        </div>
      `).join('')}
    `;
    document.querySelector('[data-pane="suppliers"]').innerHTML = html;
    document.querySelector('[data-count="suppliers"]').textContent = list.length;
  }
  document.addEventListener('click', e => {
    const id = e.target.dataset.markIn;
    if (!id) return;
    ScoutDB.patch('vehicles', list => list.map(x => x.id === id ? Object.assign({}, x, { arrived: true }) : x));
    ScoutDB.appendAudit({ action: 'VEH-IN', channel: 'gate', details: 'רכב ' + id });
    Toast.show('הרכב סומן כנכנס למחנה.', { kind: 'ok' });
    renderSuppliers();
  });

  // ----- Buses -----
  const BUS_STATUS_LABEL = { planned: 'מתוכנן', waiting: 'בחניון המתנה', cleared: 'מאושר לכניסה', inside: 'בתוך המחנה', left: 'עזב' };
  function renderBuses() {
    const buses = ScoutDB.get('buses', []);
    const tribes = ScoutDB.get('tribes', []);
    const html = `
      <div class="gate-toolbar">
        <h2 style="font-family: var(--font-ui);">לוח אוטובוסים — מסונכרן חי</h2>
        <span class="chip">${buses.length} אוטובוסים</span>
        <span style="flex:1;"></span>
        <span class="chip chip--demo">קלט נוצר בחמ"ל</span>
      </div>
      ${buses.map(b => {
        const t = tribes.find(tr => tr.id === b.tribeId);
        const tName = t ? t.name : (b.tribeName || '—');
        const canEnter = b.status === 'cleared';
        return `
          <div class="bus-row">
            <span class="vehicle-plate" style="font-size: 13px; min-width: auto;">${util.escapeHtml(b.plate)}</span>
            <div>
              <div style="font-weight: 700;">שבט ${util.escapeHtml(tName)} · ${util.escapeHtml(b.battalion || '')}${b.addedByKabat ? ' <span class="chip" style="background: rgba(91,141,239,0.18); color: var(--info); border-color: transparent;">קב״ט</span>' : ''}</div>
              <div style="color: var(--text-mid); font-size: 11px;">${b.driver ? 'נהג: ' + util.escapeHtml(b.driver) + ' · ' : ''}${b.escort ? 'מלווה: ' + util.escapeHtml(b.escort) + ' · ' : ''}${b.hanichim || 0} חניכים</div>
            </div>
            <span class="bus-status ${b.status}">${BUS_STATUS_LABEL[b.status]}</span>
            ${canEnter ? `<button class="btn btn--ok btn--sm" data-bus-in="${b.id}">הכנס למחנה</button>` :
              b.status === 'inside' ? `<button class="btn btn--sm" data-bus-out="${b.id}">סמן יציאה</button>` :
              `<span class="chip">המתנה</span>`}
          </div>
        `;
      }).join('')}
    `;
    document.querySelector('[data-pane="buses"]').innerHTML = html;
    document.querySelector('[data-count="buses"]').textContent = buses.length;
  }
  document.addEventListener('click', e => {
    const idIn = e.target.dataset.busIn, idOut = e.target.dataset.busOut;
    if (idIn) {
      ScoutDB.patch('buses', l => l.map(x => x.id === idIn ? Object.assign({}, x, { status: 'inside' }) : x));
      ScoutDB.appendAudit({ action: 'BUS-IN', channel: 'gate', details: 'אוטובוס ' + idIn });
      renderBuses();
    }
    if (idOut) {
      ScoutDB.patch('buses', l => l.map(x => x.id === idOut ? Object.assign({}, x, { status: 'left' }) : x));
      ScoutDB.appendAudit({ action: 'BUS-OUT', channel: 'gate', details: 'אוטובוס ' + idOut });
      renderBuses();
    }
  });

  // ----- Camp Staff (team + leadership only) -----
  function renderStaff() {
    const all = ScoutDB.get('staff', []) || [];
    const team = all.filter(s => !s.guestPass && s.role !== 'guest');
    const pendingCount = team.filter(s => s.pendingOnboarding).length;
    const html = `
      <div class="gate-toolbar">
        <h2 style="font-family: var(--font-ui);">צוות מחנה והנהגה</h2>
        <span class="chip">${team.length} אנשי צוות</span>
        ${pendingCount > 0 ? `<span class="chip" style="background: rgba(154,168,188,0.12); color: var(--text-mid); border-color: transparent;">${pendingCount} ממתינים להפעלה</span>` : ''}
        <span style="flex:1;"></span>
        <span class="chip chip--demo">הנפקה דרך מסך הקב"ט</span>
      </div>
      ${team.length === 0 ? '<div style="text-align:center; padding: 22px; color: var(--text-low);">אין אנשי צוות.</div>' :
        team.map(s => {
          const isPending = s.pendingOnboarding;
          const initial = (s.name.split(' ').slice(-1)[0] || s.name)[0] || '?';
          return `
            <div class="vehicle-card" ${isPending ? 'style="border-style: dashed; border-color: var(--text-low);"' : ''}>
              <div style="width: 40px; height: 40px; background: ${isPending ? 'var(--bg-deep)' : 'var(--ok)'}; color: ${isPending ? 'var(--text-mid)' : '#052817'}; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; border: 1px solid var(--border);">${util.escapeHtml(initial)}</div>
              <div class="info">
                <div class="driver">${util.escapeHtml(s.name)}${isPending ? ` <span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-low);">(${util.escapeHtml(s.tempUsername || '')})</span>` : ''}</div>
                <div class="vendor">${util.escapeHtml(UI.ROLE_LABELS[s.role] || s.role)}${s.phone ? ' · ' + util.escapeHtml(s.phone) : ''}</div>
              </div>
              ${isPending
                ? '<span class="chip" style="background: rgba(154,168,188,0.12); color: var(--text-mid); border-color: transparent; font-weight: 700; font-size: 12px;">⏳ ממתין להפעלה</span>'
                : '<span class="chip chip--ok" style="font-weight: 700;">✅ פעיל במחנה</span>'}
            </div>`;
        }).join('')}
    `;
    document.querySelector('[data-pane="staff"]').innerHTML = html;
    document.querySelector('[data-count="staff"]').textContent = team.length;
  }

  // ----- Approved Entry Guests -----
  function renderGuests() {
    const all = ScoutDB.get('staff', []) || [];
    const guests = all.filter(s => s.guestPass || s.role === 'guest');
    const html = `
      <div class="gate-toolbar">
        <h2 style="font-family: var(--font-ui);">אורחים מאושרים כניסה</h2>
        <span class="chip">${guests.length} אורחים</span>
        <span style="flex:1;"></span>
        <span class="chip chip--demo">הוספה דרך מסך הקב"ט</span>
      </div>
      ${guests.length === 0 ? '<div style="text-align:center; padding: 22px; color: var(--text-low);">אין אורחים מאושרים כרגע.</div>' :
        guests.map(g => {
          const initial = (g.name.split(' ').slice(-1)[0] || g.name)[0] || '?';
          return `
            <div class="vehicle-card" style="border-color: var(--info); box-shadow: inset 4px 0 0 var(--info);">
              <div style="width: 40px; height: 40px; background: var(--info); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px;">${util.escapeHtml(initial)}</div>
              <div class="info">
                <div class="driver">${util.escapeHtml(g.name)}${g.plate ? ' · <span style="font-family: var(--font-mono); color: var(--text-mid);">' + util.escapeHtml(g.plate) + '</span>' : ''}</div>
                <div class="vendor">${util.escapeHtml(g.affiliation || 'אורח')}${g.phone ? ' · ' + util.escapeHtml(g.phone) : ''}</div>
              </div>
              ${g.checkedInAt
                ? `<span class="chip chip--info" style="font-weight: 700;">בתוך המחנה · ${util.fmtTime(g.checkedInAt)}</span>`
                : `<button class="btn btn--ok btn--sm" data-guest-checkin="${g.id}">סמן נכנס</button>`}
            </div>`;
        }).join('')}
    `;
    document.querySelector('[data-pane="guests"]').innerHTML = html;
    document.querySelector('[data-count="guests"]').textContent = guests.length;
  }

  document.addEventListener('click', e => {
    const id = e.target.dataset.guestCheckin;
    if (!id) return;
    ScoutDB.patch('staff', l => l.map(s => s.id === id ? Object.assign({}, s, { checkedInAt: util.nowMs() }) : s));
    ScoutDB.appendAudit({ action: 'GUEST-CHECKIN', channel: 'gate', details: 'אורח נכנס: ' + id });
    Toast.show('הכניסה נרשמה.', { kind: 'ok' });
    renderGuests();
  });

  // ----- Exceptions -----
  // ----- Hanich Checkouts (HQ-approved exits) -----
  function renderCheckouts() {
    const tribes = ScoutDB.get('tribes', []);
    const approved = (ScoutDB.get('hanichim', []) || []).filter(h => h.checkoutApproved && h.status !== 'released');
    const verifications = (ScoutDB.get('checkoutVerifications', []) || []);
    const html = `
      <div class="gate-toolbar">
        <h2 style="font-family: var(--font-ui);">🚪 יציאת חניכים</h2>
        <span class="chip">${approved.length} מאושרים</span>
        <span style="flex:1;"></span>
        <button class="btn btn--sm btn--primary" id="btn-parent-pickup">👨‍👧 איסוף ע"י הורה</button>
        <button class="btn btn--sm btn--danger" id="btn-track-b">🔴 שלח אימות לחמ"ל (Track B)</button>
      </div>

      <div style="background: rgba(91,141,239,0.06); border: 1px dashed rgba(91,141,239,0.32); border-radius: var(--r-md); padding: 10px 12px; margin-bottom: 12px; font-size: 12px; color: var(--info);">
        🔒 <strong>סמכות החמ"ל בלבד</strong> — המאבטח אינו מאשר חניך באופן עצמאי. דרושים: <strong>אישור דיגיטלי</strong> מהחמ"ל + <strong>טופס נייר פיזי</strong> חתום.
      </div>

      ${approved.length === 0
        ? '<div style="color: var(--text-low); text-align: center; padding: 24px;">אין חניכים מאושרים ליציאה.</div>'
        : approved.map(h => {
          const t = tribes.find(tr => tr.id === h.tribeId);
          return `
            <div class="vehicle-card" style="border-color: var(--ok); box-shadow: inset 4px 0 0 var(--ok); background: rgba(45,216,129,0.06);">
              <div style="width: 40px; height: 40px; background: var(--ok); color: #052817; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px;">${util.escapeHtml((h.name.split(' ')[0] || '?')[0])}</div>
              <div class="info">
                <div class="driver">${util.escapeHtml(h.name)}</div>
                <div class="vendor">שבט ${util.escapeHtml(t ? t.name : '')} · אושר ע"י ${util.escapeHtml(h.checkoutApprovedBy || 'חמ"ל')}</div>
                <div style="font-size: 11px; color: var(--ok); margin-top: 2px;">📄 טופס: <code style="background: rgba(0,0,0,0.3); padding: 1px 6px; border-radius: 3px;">${util.escapeHtml(h.checkoutPaperRef || '—')}</code> · סיבה: ${util.escapeHtml(h.checkoutReason || '')}</div>
              </div>
              <span class="chip chip--ok" style="font-weight: 700;">✅ מאושר יציאה</span>
              <button class="btn btn--ok btn--sm" data-checkout-release="${h.id}">שחרר חניך</button>
            </div>`;
        }).join('')}

      ${verifications.length === 0 ? '' : `
        <div style="margin-top: 18px;">
          <div style="font-family: var(--font-ui); font-size: 12px; color: var(--text-mid); margin-bottom: 8px;">📋 בקשות אימות שנשלחו לחמ"ל (Track B)</div>
          ${verifications.slice().reverse().map(v => {
            const isResolved = v.status !== 'pending';
            return `
              <div style="padding: 10px 12px; background: ${isResolved ? 'var(--bg-elev)' : 'rgba(255,71,87,0.08)'}; border: 1px solid ${isResolved ? 'var(--border)' : 'var(--danger)'}; border-radius: var(--r-sm); margin-bottom: 6px;">
                <strong>${util.escapeHtml(v.hanichName)}</strong>
                <span class="chip chip--${v.status === 'approved' ? 'ok' : v.status === 'denied' ? 'danger' : 'warn'}" style="font-size: 10px; margin-right: 6px;">${v.status === 'pending' ? '⏳ ממתין' : v.status === 'approved' ? '✅ אומת' : '⛔ נדחה'}</span>
                <div style="font-size: 11px; color: var(--text-mid); margin-top: 4px;">${util.escapeHtml(v.reason)}</div>
              </div>`;
          }).join('')}
        </div>
      `}
    `;
    document.querySelector('[data-pane="checkouts"]').innerHTML = html;
    document.querySelector('[data-count="checkouts"]').textContent = approved.length;
  }

  document.addEventListener('click', e => {
    const id = e.target.dataset.checkoutRelease;
    if (!id) return;
    const h = (ScoutDB.get('hanichim', []) || []).find(x => x.id === id);
    if (!h) return;
    // Mandatory paper verification modal
    const host = document.createElement('div');
    host.className = 'modal-host';
    host.innerHTML = `
      <div class="modal" style="width: min(540px, 92vw);">
        <div style="color: var(--warn); font-family: var(--font-ui); font-weight: 800; letter-spacing: .14em; text-transform: uppercase; font-size: 12px;">📋 אימות חובה</div>
        <h3 style="margin: 6px 0 6px;">שחרור חניך — ${util.escapeHtml(h.name)}</h3>
        <p style="color: var(--text-mid); margin: 0 0 14px;">לפני שחרור, ודא קבלת <strong>טופס נייר פיזי</strong> חתום מהחמ"ל.</p>

        <div style="background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--r-md); padding: 14px; margin-bottom: 14px;">
          <div style="font-size: 11px; color: var(--text-low); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px;">מספר טופס מהחמ"ל</div>
          <code style="font-family: var(--font-mono); font-size: 24px; color: var(--accent); font-weight: 700;">${util.escapeHtml(h.checkoutPaperRef || '—')}</code>
          <div style="font-size: 11px; color: var(--text-mid); margin-top: 6px;">סיבה: ${util.escapeHtml(h.checkoutReason || '—')}</div>
        </div>

        <label style="display: flex; align-items: flex-start; gap: 10px; padding: 12px; background: var(--bg-deep); border: 1px solid var(--border); border-radius: var(--r-sm); cursor: pointer;">
          <input type="checkbox" id="paper-check" style="accent-color: var(--ok); width: 20px; height: 20px; margin-top: 1px;">
          <span><strong>קיבלתי את טופס הנייר הפיזי</strong> חתום מהחמ"ל ובדקתי שמספר הטופס תואם.</span>
        </label>

        <div style="display:flex; gap:10px; justify-content:flex-end; margin-top: 18px;">
          <button class="btn btn--ghost" data-cancel>ביטול</button>
          <button class="btn btn--ok" data-confirm-release disabled>שחרר חניך</button>
        </div>
      </div>
    `;
    document.body.appendChild(host);
    const cb = host.querySelector('#paper-check');
    const confirmBtn = host.querySelector('[data-confirm-release]');
    cb.addEventListener('change', () => confirmBtn.disabled = !cb.checked);
    host.querySelector('[data-cancel]').addEventListener('click', () => host.remove());
    confirmBtn.addEventListener('click', () => {
      const r = Scout.Checkout.confirmAtGate(id);
      if (!r.ok) { Toast.show(r.error, { kind: 'warn' }); return; }
      Scout.Audio.play('blip');
      Toast.show(`${h.name} שוחרר. תועד בלוג ובסטטוס.`, { kind: 'ok' });
      host.remove();
      renderCheckouts();
    });
  });

  function openParentPickupForm() {
    const all = (ScoutDB.get('hanichim', []) || []).filter(h => h.status === 'present');
    if (all.length === 0) { Toast.show('אין חניכים נוכחים.', { kind: 'warn' }); return; }
    const tribes = ScoutDB.get('tribes', []);
    const host = document.createElement('div');
    host.className = 'modal-host';
    host.innerHTML = `
      <form class="modal" style="width: min(540px, 92vw);">
        <h3>👨‍👧 קליטת הורה לאיסוף חניך</h3>
        <p style="color: var(--text-mid); margin: 0 0 14px;">הבקשה תועבר לחמ"ל, ומשם תנותב למרכז השבט לאימות מול המשפחה.</p>

        <div class="form-field"><label>שם ההורה *</label><input class="input" name="parentName" required></div>
        <div class="form-field"><label>טלפון ההורה *</label><input class="input" name="parentPhone" type="tel" required></div>
        <div class="form-field"><label>שם החניך *</label>
          <select class="select" name="hanichId" required>
            <option value="" disabled selected>— בחר חניך —</option>
            ${all.map(h => {
              const t = tribes.find(tr => tr.id === h.tribeId);
              return `<option value="${h.id}">${util.escapeHtml(h.name)} · שבט ${util.escapeHtml(t ? t.name : '')}</option>`;
            }).join('')}
          </select>
        </div>

        <div style="display:flex; gap:10px; justify-content:flex-end; margin-top: 14px;">
          <button type="button" class="btn btn--ghost" data-cancel>ביטול</button>
          <button type="submit" class="btn btn--primary">שלח בקשה לחמ"ל</button>
        </div>
      </form>
    `;
    document.body.appendChild(host);
    const form = host.querySelector('form');
    host.querySelector('[data-cancel]').addEventListener('click', () => host.remove());
    form.addEventListener('submit', e => {
      e.preventDefault();
      const r = Scout.ParentPickup.requestAtGate({
        parentName: form.parentName.value.trim(),
        parentPhone: form.parentPhone.value.trim(),
        hanichId: form.hanichId.value,
      });
      if (!r.ok) { Toast.show(r.error, { kind: 'warn' }); return; }
      Toast.show('הבקשה נשלחה לחמ"ל לניתוב למרכז שבט.', { kind: 'warn' });
      Scout.Audio.play('echo-bell');
      host.remove();
    });
  }

  function openTrackBVerification() {
    const present = (ScoutDB.get('hanichim', []) || []).filter(h => h.status === 'present' && !h.checkoutApproved);
    if (present.length === 0) { Toast.show('אין חניכים זמינים.', { kind: 'warn' }); return; }
    const tribes = ScoutDB.get('tribes', []);
    const host = document.createElement('div');
    host.className = 'modal-host';
    host.innerHTML = `
      <form class="modal" style="width: min(540px, 92vw);">
        <div style="color: var(--danger); font-family: var(--font-ui); font-weight: 800; letter-spacing: .14em; text-transform: uppercase; font-size: 12px;">🔴 TRACK B</div>
        <h3 style="margin: 6px 0 6px;">בקשת אימות חניך לחמ"ל</h3>
        <p style="color: var(--text-mid); margin: 0 0 14px;">החניך הגיע עם טופס נייר חתום אבל ללא סטטוס דיגיטלי במערכת. רק <strong>אחראי חמ"ל</strong> רשאי לאשר את המקרה.</p>

        <div class="form-field"><label>שם החניך / זיהוי *</label>
          <select class="select" name="hanichId" required>
            <option value="" disabled selected>— בחר —</option>
            ${present.map(h => {
              const t = tribes.find(tr => tr.id === h.tribeId);
              return `<option value="${h.id}" data-name="${util.escapeHtml(h.name)}">${util.escapeHtml(h.name)} · שבט ${util.escapeHtml(t ? t.name : '')}</option>`;
            }).join('')}
          </select>
        </div>
        <div class="form-field"><label>סיבת האימות *</label>
          <textarea class="textarea" name="reason" required rows="3" style="width:100%;" placeholder="לדוגמה: חניך הציג טופס חתום ביד מהחמ&quot;ל ללא רישום במערכת"></textarea>
        </div>

        <div style="display:flex; gap:10px; justify-content:flex-end; margin-top: 14px;">
          <button type="button" class="btn btn--ghost" data-cancel>ביטול</button>
          <button type="submit" class="btn btn--danger">שלח לחמ"ל לאימות</button>
        </div>
      </form>
    `;
    document.body.appendChild(host);
    const form = host.querySelector('form');
    host.querySelector('[data-cancel]').addEventListener('click', () => host.remove());
    form.addEventListener('submit', e => {
      e.preventDefault();
      const id = form.hanichId.value;
      const opt = form.hanichId.options[form.hanichId.selectedIndex];
      const name = opt.dataset.name || opt.textContent.split(' · ')[0];
      Scout.Checkout.requestGateVerification(name, form.reason.value.trim());
      Toast.show('הבקשה נשלחה לחמ"ל. רק אחראי חמ"ל יכול לאשר.', { kind: 'warn' });
      Scout.Audio.play('pulse-alert');
      host.remove();
      renderCheckouts();
    });
  }

  document.addEventListener('click', e => {
    if (e.target.id === 'btn-parent-pickup') openParentPickupForm();
    if (e.target.id === 'btn-track-b')       openTrackBVerification();

  // ============================================================
  // ===== Universal SOS button — 3-second long-press =====
  // ============================================================
  (function setupUniversalSOS() {
    const btn = document.getElementById('universal-sos');
    const ring = btn.querySelector('.sos-ring circle');
    const CIRC = 2 * Math.PI * 47; // ~295
    let timer = null;
    let startTs = 0;

    function reset() {
      btn.classList.remove('arming');
      ring.style.strokeDasharray = `0 ${CIRC}`;
      if (timer) { clearInterval(timer); timer = null; }
    }
    function arm(e) {
      if (e.cancelable) e.preventDefault();
      if (btn.classList.contains('fired')) return;
      startTs = Date.now();
      btn.classList.add('arming');
      // play a quick blip so user knows it's arming
      try { Scout.Audio.play('blip'); } catch (err) {}
      timer = setInterval(() => {
        const elapsed = Date.now() - startTs;
        const pct = Math.min(1, elapsed / 3000);
        ring.style.strokeDasharray = `${(pct * CIRC).toFixed(1)} ${CIRC}`;
        if (pct >= 1) {
          clearInterval(timer); timer = null;
          fire();
        }
      }, 50);
    }
    function disarm() {
      if (timer) {
        // Cancelled early
        const elapsed = Date.now() - startTs;
        if (elapsed < 600) {
          Toast.show('⚠ ה-SOS דורש לחיצה ארוכה של 3 שניות.', { kind: 'warn' });
        }
      }
      reset();
    }
    function fire() {
      btn.classList.remove('arming');
      btn.classList.add('fired');
      btn.querySelector('.sos-hint').textContent = 'נשלח לחמ"ל';
      const pos = ScoutDB.get('myLocation', null) || (Scout.Geo.snapshot()[0] && { lat: Scout.Geo.snapshot()[0].lat, lng: Scout.Geo.snapshot()[0].lng }) || null;
      const ev = SOS.trigger({
        source: currentMission === 'patrol' ? 'patrol-sos' : 'guard-sos',
        label: `מאבטח ${UI.currentPersona().name} — לחצן מצוקה`,
        gps: pos,
      });
      try { Scout.Audio.play('tactical-siren', { durationMs: 3500 }); } catch (e) {}
      showFiredScreen(ev);
    }

    btn.addEventListener('pointerdown', arm);
    btn.addEventListener('pointerup', disarm);
    btn.addEventListener('pointerleave', disarm);
    btn.addEventListener('pointercancel', disarm);
    // Touchend in case pointer not supported
    btn.addEventListener('touchend', disarm);
  })();

  function showFiredScreen(ev) {
    // Take-over screen confirming SOS sent; allows urgent updates
    const host = document.createElement('div');
    host.className = 'sos-fired-screen';
    host.innerHTML = `
      <div style="font-size: 56px; margin-bottom: 12px;">🚨</div>
      <h2>SOS שודר לחמ"ל</h2>
      <p>אנא המתן להגעת תגבורת. הקב"ט קיבל את מיקום ה-GPS שלך וצליל סירנה.</p>
      <div class="actions">
        <button class="btn btn--lg" data-fired-action="voice">🎙 הודעה קולית דחופה</button>
        <button class="btn btn--lg" data-fired-action="update">📝 עדכון מצב</button>
        <button class="btn btn--ok btn--lg" data-fired-action="ack">✓ חמ"ל בקשר</button>
        <button class="btn btn--danger btn--lg" data-fired-action="cancel">✕ ביטול שווא</button>
      </div>
    `;
    document.body.appendChild(host);
    host.addEventListener('click', e => {
      const btn = e.target.closest('[data-fired-action]'); if (!btn) return;
      const a = btn.dataset.firedAction;
      if (a === 'voice') {
        try { Scout.Audio.play('voice-prompt', { text: 'מאבטח שולח עדכון קולי דחוף' }); } catch (e) {}
        Toast.show('הודעה קולית נשלחה (דמו).', { kind: 'ok' });
      }
      if (a === 'update') {
        const txt = prompt('עדכון מצב מהשטח:');
        if (txt && txt.trim()) { SOS.addFieldUpdate(txt.trim()); Toast.show('העדכון נשלח לחמ"ל.', { kind: 'ok' }); }
      }
      if (a === 'ack') {
        host.remove();
        document.getElementById('universal-sos').classList.remove('fired');
        document.getElementById('universal-sos').querySelector('.sos-hint').textContent = 'החזק 3 שניות';
      }
      if (a === 'cancel') {
        if (!confirm('לבטל את ה-SOS כשגיאה / לחיצה שגויה? פעולה זו תושת בלוג.')) return;
        ScoutDB.appendAudit({ action: 'SOS-FALSE-ALARM', channel: 'sos', details: 'בוטל ע״י השולח כשווא' });
        SOS.clear('בוטל ע״י השולח כלחיצה שגויה / שווא');
        host.remove();
        document.getElementById('universal-sos').classList.remove('fired');
        document.getElementById('universal-sos').querySelector('.sos-hint').textContent = 'החזק 3 שניות';
        Toast.show('האירוע בוטל.', { kind: 'warn' });
      }
    });
  }

  // ============================================================
  // ===== Live search filter for gate-mode tabs =====
  // ============================================================
  (function setupGateSearch() {
    const input = document.getElementById('gate-search-input');
    const hint = document.getElementById('gate-search-hint');
    if (!input) return;
    function apply() {
      const term = input.value.trim().toLowerCase();
      const activePane = document.querySelector('[data-pane]:not([hidden])');
      if (!activePane) return;
      let visible = 0, total = 0;
      activePane.querySelectorAll('.vehicle-card, .bus-row, tbody tr').forEach(row => {
        total++;
        if (!term) { row.style.display = ''; visible++; return; }
        const txt = row.textContent.toLowerCase();
        if (txt.includes(term)) { row.style.display = ''; visible++; }
        else row.style.display = 'none';
      });
      if (term) { hint.hidden = false; hint.textContent = `${visible} / ${total} תוצאות`; }
      else { hint.hidden = true; }
    }
    input.addEventListener('input', apply);
    document.querySelectorAll('.gate-tab[data-tab]').forEach(t => t.addEventListener('click', () => setTimeout(apply, 0)));
    // Reapply after re-renders (any data change triggers a re-render)
    ['bus:vehicle-added','bus:bus-added','bus:guest-issued','bus:gate-exception','bus:gate-exception:resolved','auth:onboarded','auth:user-invited','personnel:update']
      .forEach(ch => Bus.on(ch, () => setTimeout(apply, 50)));
  })();

  // ============================================================
  // ===== Chat hub (slide-up sheet from FAB) =====
  // ============================================================
  const Chat = Scout.Chat;
  const chatFab    = document.getElementById('chat-fab');
  const chatSheet  = document.getElementById('chat-sheet');
  const chatBody   = document.getElementById('chat-sheet-body');
  const chatTitle  = document.getElementById('chat-sheet-title');
  const chatMeta   = document.getElementById('chat-sheet-meta');
  const chatCompose= document.getElementById('chat-sheet-compose');
  const chatBack   = document.getElementById('chat-sheet-back');
  const chatClose  = document.getElementById('chat-sheet-close');
  const chatUnread = document.getElementById('chat-fab-unread');
  let chatView = 'list';        // 'list' or 'thread'
  let activeChatId = null;
  let lastSeenIdx  = ScoutDB.get('chatLastSeen', {}) || {};

  function openChatSheet() {
    chatSheet.classList.add('is-open');
    chatFab.hidden = true;
    showList();
  }
  function closeChatSheet() {
    chatSheet.classList.remove('is-open');
    chatFab.hidden = false;
    updateUnread();
  }
  function showList() {
    chatView = 'list';
    activeChatId = null;
    chatTitle.textContent = 'צ׳אט מבצעי';
    chatBack.hidden = true;
    chatCompose.hidden = true;
    chatMeta.textContent = persona.staffId ? 'מחובר כ-' + persona.name : 'דמו';
    const role = UI.currentPersona().role;
    const channels = Chat.visibleChannels(role, persona.staffId);
    if (channels.length === 0) {
      chatBody.innerHTML = '<div style="color: var(--text-mid); text-align:center; padding: 30px;">אין ערוצים זמינים עבור התפקיד שלך כעת.</div>';
      return;
    }
    chatBody.innerHTML = channels.map(c => {
      const msgs = Chat.messages(c.id);
      const last = msgs[msgs.length - 1];
      const lastIdx = msgs.length - 1;
      const seenIdx = lastSeenIdx[c.id] === undefined ? -1 : lastSeenIdx[c.id];
      const unread = Math.max(0, lastIdx - seenIdx);
      let icon = c.locked ? '🔒' : (c.custom ? '👥' : (c.isDM ? '🗨' : '💬'));
      return `
        <div class="channel-row" data-channel="${c.id}">
          <div style="font-size: 20px;">${icon}</div>
          <div style="flex:1; overflow:hidden;">
            <div class="channel-name">${util.escapeHtml(c.name)}</div>
            <div class="channel-meta">${last ? util.escapeHtml(last.text.slice(0, 50)) + (last.text.length > 50 ? '...' : '') : 'אין הודעות עדיין'}</div>
          </div>
          ${unread > 0 ? `<span class="chip chip--warn" style="font-size: 10px;">${unread}</span>` : ''}
        </div>
      `;
    }).join('');
  }
  function showThread(channelId) {
    chatView = 'thread';
    activeChatId = channelId;
    const channels = Chat.visibleChannels(UI.currentPersona().role, persona.staffId);
    const chan = channels.find(c => c.id === channelId);
    if (!chan) { showList(); return; }
    chatTitle.textContent = chan.name;
    chatBack.hidden = false;
    chatMeta.textContent = chan.locked ? '🔒 ערוץ נעול' : (chan.isDM ? 'שיחה פרטית' : 'ערוץ קבוצתי');
    const msgs = Chat.messages(channelId);
    const me = UI.currentPersona().name;
    chatBody.innerHTML = msgs.map(m => {
      const cls = m.role === 'system' ? 'bubble--system' : (m.from === me ? 'bubble--me' : 'bubble--other');
      return `<div class="bubble ${cls}">
        ${m.role !== 'system' ? `<span class="meta"><span class="role">${util.escapeHtml(UI.ROLE_LABELS[m.role] || m.role)}</span>${util.escapeHtml(m.from)}</span>` : ''}
        ${util.escapeHtml(m.text)}
        ${m.role !== 'system' ? `<span class="ts">${util.fmtTime(m.ts)} ✓✓</span>` : ''}
      </div>`;
    }).join('') || '<div style="color: var(--text-mid); text-align:center; padding: 30px;">אין הודעות. שלח את הראשונה ↓</div>';
    chatBody.scrollTop = chatBody.scrollHeight;
    // Compose only if guard can write here
    const role = UI.currentPersona().role;
    const canWrite = !chan.locked || ['kabat','hq-shift','hq-op','national'].includes(role);
    chatCompose.hidden = false;
    chatCompose.querySelector('[name="msg"]').disabled = !canWrite;
    chatCompose.querySelector('button[type="submit"]').disabled = !canWrite;
    chatCompose.querySelector('[name="msg"]').placeholder = canWrite ? 'הקלד הודעה...' : '🔒 ערוץ נעול לכתיבה';
    // Mark as read
    lastSeenIdx[channelId] = Chat.messages(channelId).length - 1;
    ScoutDB.set('chatLastSeen', lastSeenIdx);
    updateUnread();
  }
  function updateUnread() {
    const role = UI.currentPersona().role;
    const channels = Chat.visibleChannels(role, persona.staffId);
    let total = 0;
    channels.forEach(c => {
      const lastIdx = Chat.messages(c.id).length - 1;
      const seen = lastSeenIdx[c.id] === undefined ? -1 : lastSeenIdx[c.id];
      total += Math.max(0, lastIdx - seen);
    });
    if (total > 0) { chatUnread.hidden = false; chatUnread.textContent = total > 99 ? '99+' : total; }
    else { chatUnread.hidden = true; }
  }

  chatFab.addEventListener('click', openChatSheet);
  chatClose.addEventListener('click', closeChatSheet);
  chatBack.addEventListener('click', showList);
  chatBody.addEventListener('click', e => {
    const row = e.target.closest('[data-channel]');
    if (!row) return;
    showThread(row.dataset.channel);
  });
  chatCompose.addEventListener('submit', e => {
    e.preventDefault();
    const input = e.target.msg;
    const text = input.value.trim();
    if (!text || !activeChatId) return;
    Chat.send(activeChatId, text);
    input.value = '';
    showThread(activeChatId);
  });
  // Live update from Bus
  Bus.on('chat:new', () => {
    if (chatSheet.classList.contains('is-open')) {
      if (chatView === 'thread' && activeChatId) showThread(activeChatId);
      else showList();
    }
    updateUnread();
  });
  Bus.on('chat:groups-updated', () => {
    if (chatSheet.classList.contains('is-open') && chatView === 'list') showList();
    updateUnread();
  });
  Bus.on('bus:broadcast', payload => {
    Toast.show('📢 ' + payload.text, { kind: 'warn', duration: 5000 });
    try { Scout.Audio.play('voice-prompt', { text: payload.text }); } catch (e) {}
  });
  updateUnread();
})();
</script>
</body>
</html>

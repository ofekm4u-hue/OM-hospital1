<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>שו"ב | מאבטח ש"ג</title>
<link rel="stylesheet" href="shared/tokens.css">
<style>
  .gate-wrap {
    padding: 12px;
    display: grid;
    grid-template-columns: 220px minmax(0, 1fr);
    gap: 12px;
    min-height: calc(100vh - var(--header-h));
  }
  @media (max-width: 820px) {
    .gate-wrap { grid-template-columns: 1fr; }
    .gate-tabs { display: flex !important; overflow-x: auto; }
    .gate-tab { flex: none; }
  }

  .gate-tabs {
    display: grid;
    gap: 8px;
    align-content: start;
  }
  .gate-tab {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 14px;
    cursor: pointer;
    transition: all var(--t-fast);
    text-align: right;
    font-family: var(--font-ui);
  }
  .gate-tab:hover { border-color: var(--accent); }
  .gate-tab.is-active {
    background: var(--bg-elev-2);
    border-color: var(--accent);
    box-shadow: inset 4px 0 0 var(--accent);
  }
  .gate-tab .tab-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .gate-tab .tab-meta { font-size: 11px; color: var(--text-mid); }
  .gate-tab .tab-count {
    display: inline-block;
    margin-top: 6px;
    padding: 2px 8px;
    background: var(--bg-deep);
    border-radius: var(--r-pill);
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
  }

  .gate-content {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 16px;
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .gate-toolbar {
    display: flex; gap: 8px; align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .vehicle-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 12px 14px;
    display: flex;
    gap: 14px;
    align-items: center;
  }
  .vehicle-card + .vehicle-card { margin-top: 8px; }
  .vehicle-plate {
    background: var(--bg-deep);
    color: var(--accent);
    font-family: var(--font-mono);
    font-weight: 700;
    padding: 8px 12px;
    border-radius: var(--r-sm);
    border: 1px solid var(--border);
    font-size: 16px;
    letter-spacing: .05em;
    min-width: 130px;
    text-align: center;
  }
  .vehicle-card .info { flex: 1; }
  .vehicle-card .driver { font-weight: 700; }
  .vehicle-card .vendor { color: var(--text-mid); font-size: 12px; }

  .scan-banner {
    background: var(--bg-elev);
    border: 1px dashed var(--border-hi);
    border-radius: var(--r-md);
    padding: 18px;
    text-align: center;
    margin-bottom: 14px;
  }
  .scan-banner h3 { margin-bottom: 6px; }
  .scan-banner.is-blacklist {
    background: rgba(255,71,87,0.10);
    border-color: var(--danger);
    color: var(--danger);
    animation: blink-danger 0.8s infinite;
  }

  .bus-row {
    display: grid;
    grid-template-columns: 100px 1fr auto auto;
    gap: 10px;
    align-items: center;
    padding: 10px 12px;
    background: var(--bg-elev);
    border-radius: var(--r-sm);
    margin-bottom: 6px;
  }
  .bus-status {
    padding: 4px 10px;
    border-radius: var(--r-pill);
    font-size: 11px;
    font-weight: 700;
    font-family: var(--font-ui);
    color: white;
  }
  .bus-status.planned { background: var(--bus-planned); }
  .bus-status.waiting { background: var(--bus-waiting); color: #1a0e00; }
  .bus-status.cleared { background: var(--bus-cleared); color: #052817; }
  .bus-status.inside  { background: var(--bus-inside); }
  .bus-status.left    { background: var(--bus-left); }
</style>
</head>
<body class="tactical-grid">
  <div id="header"></div>

  <div class="gate-wrap">
    <nav class="gate-tabs">
      <button class="gate-tab is-active" data-tab="suppliers">
        <div class="tab-title">🚚 ספקים</div>
        <div class="tab-meta">רכבי אספקה מאושרים</div>
        <span class="tab-count" data-count="suppliers">—</span>
      </button>
      <button class="gate-tab" data-tab="buses">
        <div class="tab-title">🚌 אוטובוסים</div>
        <div class="tab-meta">מסונכרן עם חמ"ל</div>
        <span class="tab-count" data-count="buses">—</span>
      </button>
      <button class="gate-tab" data-tab="staff">
        <div class="tab-title">👤 סגל ואורחים</div>
        <div class="tab-meta">רכבי סגל פנימיים</div>
        <span class="tab-count" data-count="staff">—</span>
      </button>
      <button class="gate-tab" data-tab="exceptions">
        <div class="tab-title">⚠ אישורים חריגים</div>
        <div class="tab-meta">ממתינים לקב"ט</div>
        <span class="tab-count" data-count="exceptions">—</span>
      </button>
      <div style="margin-top: 12px; padding: 12px; background: var(--bg-elev); border-radius: var(--r-md); border: 1px dashed var(--border);">
        <div style="font-family: var(--font-ui); font-weight: 700; font-size: 13px; margin-bottom: 8px;">📷 סורק תעודות</div>
        <button class="btn btn--primary btn--block" id="btn-scan">סרוק תעודת זהות</button>
        <button class="btn btn--block" id="btn-request-exception" style="margin-top: 6px;">בקש אישור חריג</button>
      </div>
    </nav>

    <main class="gate-content">
      <!-- Scan banner -->
      <div class="scan-banner" id="scan-banner" hidden></div>

      <!-- Tab panes -->
      <section data-pane="suppliers"></section>
      <section data-pane="buses" hidden></section>
      <section data-pane="staff" hidden></section>
      <section data-pane="exceptions" hidden></section>
    </main>
  </div>

<script src="shared/engine.js"></script>
<script>
(function () {
  'use strict';
  const { ScoutDB, Bus, UI, SOS, Toast, util, DMS } = Scout;

  if (!ScoutDB.get('currentPersona', null)) UI.setPersona({ name: 'מאבטח אופיר', role: 'guard' });

  document.getElementById('header').innerHTML = UI.header({ title: 'מאבטח ש"ג — שער ראשי' });
  UI.bindHeader(document.body);
  UI.mockBadge('דמו פרזנטציה');

  // Allow URL flag to demo DMS quickly
  if (util.getParam('dms') === 'on') {
    DMS.start({ force: true });
    Toast.show('Dead-Man Switch מופעל במצב דמו (פופ-אפ בעוד 4 שניות)', { kind: 'warn' });
  }

  // Tabs
  const tabs = document.querySelectorAll('.gate-tab[data-tab]');
  tabs.forEach(t => t.addEventListener('click', () => {
    tabs.forEach(x => x.classList.remove('is-active'));
    t.classList.add('is-active');
    document.querySelectorAll('[data-pane]').forEach(p => p.hidden = p.dataset.pane !== t.dataset.tab);
  }));

  // Helpers
  const banner = document.getElementById('scan-banner');
  function showBanner(html, kind) {
    banner.hidden = false;
    banner.className = 'scan-banner' + (kind === 'danger' ? ' is-blacklist' : '');
    banner.innerHTML = html;
    setTimeout(() => banner.hidden = true, 5500);
  }

  // ----- Suppliers -----
  function renderSuppliers() {
    const list = ScoutDB.get('vehicles', []);
    const html = `
      <div class="gate-toolbar">
        <h2 style="font-family: var(--font-ui);">רכבי ספקים מאושרים</h2>
        <span class="chip">${list.length} רכבים</span>
        <span style="flex:1;"></span>
        <span class="chip chip--ok">פילטר ירוק אוטומטי בשער</span>
      </div>
      ${list.map(v => `
        <div class="vehicle-card">
          <div class="vehicle-plate">${util.escapeHtml(v.plate)}</div>
          <div class="info">
            <div class="driver">${util.escapeHtml(v.driver)}</div>
            <div class="vendor">${util.escapeHtml(v.vendor)}</div>
          </div>
          ${v.arrived
            ? '<span class="chip chip--info">בתוך המחנה</span>'
            : `<button class="btn btn--ok" data-mark-in="${v.id}">אשר כניסה</button>`}
        </div>
      `).join('')}
    `;
    document.querySelector('[data-pane="suppliers"]').innerHTML = html;
    document.querySelector('[data-count="suppliers"]').textContent = list.length;
  }
  document.addEventListener('click', e => {
    const id = e.target.dataset.markIn;
    if (!id) return;
    ScoutDB.patch('vehicles', list => list.map(x => x.id === id ? Object.assign({}, x, { arrived: true }) : x));
    ScoutDB.appendAudit({ action: 'VEH-IN', channel: 'gate', details: 'רכב ' + id });
    Toast.show('הרכב סומן כנכנס למחנה.', { kind: 'ok' });
    renderSuppliers();
  });

  // ----- Buses -----
  const BUS_STATUS_LABEL = { planned: 'מתוכנן', waiting: 'בחניון המתנה', cleared: 'מאושר לכניסה', inside: 'בתוך המחנה', left: 'עזב' };
  function renderBuses() {
    const buses = ScoutDB.get('buses', []);
    const tribes = ScoutDB.get('tribes', []);
    const html = `
      <div class="gate-toolbar">
        <h2 style="font-family: var(--font-ui);">לוח אוטובוסים — מסונכרן חי</h2>
        <span class="chip">${buses.length} אוטובוסים</span>
        <span style="flex:1;"></span>
        <span class="chip chip--demo">קלט נוצר בחמ"ל</span>
      </div>
      ${buses.map(b => {
        const t = tribes.find(tr => tr.id === b.tribeId);
        const canEnter = b.status === 'cleared';
        return `
          <div class="bus-row">
            <span class="vehicle-plate" style="font-size: 13px; min-width: auto;">${util.escapeHtml(b.plate)}</span>
            <div>
              <div style="font-weight: 700;">שבט ${util.escapeHtml(t ? t.name : '—')} · ${util.escapeHtml(b.battalion)}</div>
              <div style="color: var(--text-mid); font-size: 11px;">נהג: ${util.escapeHtml(b.driver)} · מלווה: ${util.escapeHtml(b.escort)} · ${b.hanichim} חניכים</div>
            </div>
            <span class="bus-status ${b.status}">${BUS_STATUS_LABEL[b.status]}</span>
            ${canEnter ? `<button class="btn btn--ok btn--sm" data-bus-in="${b.id}">הכנס למחנה</button>` :
              b.status === 'inside' ? `<button class="btn btn--sm" data-bus-out="${b.id}">סמן יציאה</button>` :
              `<span class="chip">המתנה</span>`}
          </div>
        `;
      }).join('')}
    `;
    document.querySelector('[data-pane="buses"]').innerHTML = html;
    document.querySelector('[data-count="buses"]').textContent = buses.length;
  }
  document.addEventListener('click', e => {
    const idIn = e.target.dataset.busIn, idOut = e.target.dataset.busOut;
    if (idIn) {
      ScoutDB.patch('buses', l => l.map(x => x.id === idIn ? Object.assign({}, x, { status: 'inside' }) : x));
      ScoutDB.appendAudit({ action: 'BUS-IN', channel: 'gate', details: 'אוטובוס ' + idIn });
      renderBuses();
    }
    if (idOut) {
      ScoutDB.patch('buses', l => l.map(x => x.id === idOut ? Object.assign({}, x, { status: 'left' }) : x));
      ScoutDB.appendAudit({ action: 'BUS-OUT', channel: 'gate', details: 'אוטובוס ' + idOut });
      renderBuses();
    }
  });

  // ----- Staff -----
  function renderStaff() {
    const staff = ScoutDB.get('staff', []);
    const html = `
      <div class="gate-toolbar">
        <h2 style="font-family: var(--font-ui);">רכבי סגל ואורחים</h2>
        <span class="chip">${staff.length} פעילים</span>
        <span style="flex:1;"></span>
        <button class="btn btn--sm" id="btn-add-staff">+ הוסף אורח</button>
      </div>
      ${staff.map(s => `
        <div class="vehicle-card">
          <div style="width: 40px; height: 40px; background: var(--bg-deep); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; border: 1px solid var(--border);">${util.escapeHtml(s.name.split(' ').slice(-1)[0][0] || '?')}</div>
          <div class="info">
            <div class="driver">${util.escapeHtml(s.name)}</div>
            <div class="vendor">${UI.ROLE_LABELS[s.role] || s.role}</div>
          </div>
          <span class="chip ${s.active ? 'chip--ok' : ''}">${s.active ? 'פעיל' : 'לא פעיל'}</span>
        </div>
      `).join('')}
    `;
    document.querySelector('[data-pane="staff"]').innerHTML = html;
    document.querySelector('[data-count="staff"]').textContent = staff.length;
  }
  document.addEventListener('click', e => {
    if (e.target.id === 'btn-add-staff') {
      const name = prompt('שם האורח:');
      if (!name) return;
      ScoutDB.patch('staff', l => l.concat([{ id: 'st-' + util.uuid().slice(0, 5), name, role: 'guest', active: true }]));
      Toast.show('האורח נוסף לרשימה.', { kind: 'ok' });
      renderStaff();
    }
  });

  // ----- Exceptions -----
  function renderExceptions() {
    const all = ScoutDB.get('gateExceptions', []) || [];
    const pending = all.filter(x => !x.resolved);
    const html = `
      <div class="gate-toolbar">
        <h2 style="font-family: var(--font-ui);">בקשות אישור חריג</h2>
        <span class="chip chip--warn">${pending.length} ממתינים</span>
        <span style="flex:1;"></span>
        <span class="chip chip--demo">פיד חי מקב"ט</span>
      </div>
      ${all.length === 0 ? '<div style="color: var(--text-low); padding: 12px;">אין בקשות.</div>' :
      all.slice().reverse().map(x => `
        <div class="vehicle-card">
          <div class="vehicle-plate">${util.escapeHtml(x.plate || x.idNum || '?')}</div>
          <div class="info">
            <div class="driver">${util.escapeHtml(x.who || 'בקשה לאישור')}</div>
            <div class="vendor">${util.escapeHtml(x.reason || '—')} · ${util.fmtTime(x.ts)}</div>
          </div>
          ${x.resolved
            ? `<span class="chip chip--${x.decision === 'approved' ? 'ok' : 'danger'}">${x.decision === 'approved' ? 'אושר' : 'נדחה'}</span>`
            : `<span class="chip chip--warn">ממתין</span>`}
        </div>
      `).join('')}
    `;
    document.querySelector('[data-pane="exceptions"]').innerHTML = html;
    document.querySelector('[data-count="exceptions"]').textContent = pending.length;
  }

  // ----- Scan ID (mock) -----
  const FAKE_IDS = ['034567891', '321456789', '589632147', '111222333', '654321987'];
  document.getElementById('btn-scan').addEventListener('click', () => {
    const id = util.pick(FAKE_IDS);
    const blacklist = ScoutDB.get('blacklist', []);
    const hit = blacklist.find(b => b.value === id);
    Scout.Audio.play('blip');
    if (hit) {
      showBanner(`
        <h3>⛔ חסום ע"י קב"ט</h3>
        <p>ת.ז. <strong>${id}</strong></p>
        <p style="font-size: 12px;">סיבה: ${util.escapeHtml(hit.reason)}</p>
        <p style="font-size: 12px; margin-top: 6px;">לא ניתן להכניס ללא אישור-על של הקב"ט.</p>
      `, 'danger');
      Scout.Audio.play('pulse-alert');
      ScoutDB.appendAudit({ action: 'BLACKLIST-HIT', channel: 'gate', details: 'ת.ז. ' + id });
    } else {
      showBanner(`<h3>✅ ת.ז. ${id}</h3><p>תקף לכניסה — הוכנס לרשימת הסגל</p>`, 'ok');
      ScoutDB.appendAudit({ action: 'ID-SCAN', channel: 'gate', details: 'ת.ז. ' + id });
    }
  });

  // ----- Request exception -----
  document.getElementById('btn-request-exception').addEventListener('click', () => {
    const plate = prompt('מספר רכב חריג (לדוגמה: 99-887-66):', '99-887-66');
    if (!plate) return;
    const reason = prompt('סיבה לבקשה:', 'אורח לא מתואם — נטען שהוזמן ע"י סגל');
    const id = util.uuid().slice(0, 8);
    const item = { id, plate, reason, who: 'בקשת ש"ג ' + UI.currentPersona().name, ts: util.nowMs(), resolved: false };
    ScoutDB.patch('gateExceptions', l => (l || []).concat([item]));
    Bus.emit('bus:gate-exception', item);
    ScoutDB.appendAudit({ action: 'GATE-EXCEPTION-REQ', channel: 'gate', details: `${plate} — ${reason}` });
    Toast.show('הבקשה נשלחה לקב"ט וחמ"ל.', { kind: 'warn' });
    renderExceptions();
  });

  // Cross-tab resolution from kabat/hq
  Bus.on('bus:gate-exception:resolved', payload => {
    const item = (ScoutDB.get('gateExceptions', []) || []).find(x => x.id === payload.id);
    if (item) {
      Toast.show(`בקשה לרכב ${item.plate || item.idNum} ${payload.decision === 'approved' ? 'אושרה' : 'נדחתה'}`, { kind: payload.decision === 'approved' ? 'ok' : 'danger' });
      Scout.Audio.play(payload.decision === 'approved' ? 'blip' : 'pulse-alert');
    }
    renderExceptions();
  });

  // Sync new items added by ourselves
  Bus.on('bus:gate-exception', () => renderExceptions());

  UI.bindGlobalSOS({ lock: false });

  // Initial render
  renderSuppliers();
  renderBuses();
  renderStaff();
  renderExceptions();
})();
</script>
</body>
</html>

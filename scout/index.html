<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>שו"ב | כניסה למערכת</title>
<link rel="stylesheet" href="shared/tokens.css">
<style>
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow-x: hidden;
  }

  /* Atmospheric background accents */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 80% 50% at 20% 0%, rgba(77,208,225,0.10), transparent 50%),
      radial-gradient(ellipse 60% 50% at 100% 100%, rgba(91,141,239,0.10), transparent 55%);
    z-index: -1;
  }

  .login-shell {
    width: 100%;
    max-width: 440px;
    position: relative;
    animation: fade-in 320ms var(--ease);
  }

  /* Brand block */
  .brand-block {
    text-align: center;
    margin-bottom: 28px;
  }
  .brand-logo {
    width: 72px;
    height: 72px;
    margin: 0 auto 18px;
    background: linear-gradient(135deg, var(--accent), var(--info));
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 12px 40px var(--accent-glow), inset 0 0 0 1px rgba(255,255,255,0.1);
    position: relative;
  }
  .brand-logo::after {
    content: '';
    position: absolute;
    inset: 9px;
    background: var(--bg-deep);
    border-radius: 8px;
    background-image:
      linear-gradient(45deg, var(--accent) 25%, transparent 25%),
      linear-gradient(-45deg, var(--info) 25%, transparent 25%);
    background-size: 12px 12px;
    opacity: 0.85;
  }
  .brand-title {
    font-family: var(--font-ui);
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.015em;
  }
  .brand-subtitle {
    color: var(--text-mid);
    font-size: 12px;
    margin-top: 6px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-family: var(--font-ui);
    font-weight: 600;
  }

  /* Login card */
  .login-card {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 30px;
    box-shadow: var(--shadow-hi);
  }
  .login-card h2 {
    font-size: 20px;
    margin-bottom: 4px;
  }
  .login-card .sub {
    color: var(--text-mid);
    font-size: 13px;
    margin-bottom: 22px;
  }

  /* Form fields */
  .form-field {
    margin-bottom: 16px;
  }
  .form-field label {
    display: block;
    font-family: var(--font-ui);
    font-size: 11px;
    font-weight: 700;
    color: var(--text-mid);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 6px;
  }
  .input-with-icon {
    position: relative;
  }
  .input-with-icon .input {
    padding-right: 42px;
    height: 44px;
    font-size: 15px;
  }
  .input-with-icon .icon {
    position: absolute;
    top: 50%;
    right: 14px;
    transform: translateY(-50%);
    color: var(--text-low);
    font-size: 16px;
    pointer-events: none;
  }
  .input.is-invalid {
    border-color: var(--danger);
    box-shadow: 0 0 0 3px var(--danger-soft);
  }

  /* Row with remember + forgot */
  .form-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 22px;
  }
  .form-row .checkbox {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-mid);
    user-select: none;
  }
  .form-row .checkbox input {
    accent-color: var(--accent);
    width: 16px;
    height: 16px;
    cursor: pointer;
  }
  .form-row a {
    color: var(--accent);
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
  }
  .form-row a:hover {
    text-decoration: underline;
  }

  /* Error message */
  .error-msg {
    background: rgba(255,71,87,0.10);
    border: 1px solid var(--danger);
    color: var(--danger);
    padding: 10px 14px;
    border-radius: var(--r-sm);
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
    align-items: center;
    gap: 10px;
    animation: fade-in 200ms var(--ease);
  }
  .error-msg.is-active {
    display: flex;
  }

  /* Demo credentials panel */
  .demo-panel {
    margin-top: 24px;
    padding: 14px 16px;
    background: rgba(91,141,239,0.06);
    border: 1px dashed rgba(91,141,239,0.32);
    border-radius: var(--r-md);
  }
  .demo-panel-title {
    font-family: var(--font-ui);
    font-weight: 700;
    font-size: 10px;
    color: var(--info);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .demo-credentials {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .demo-cred {
    padding: 7px 10px;
    background: rgba(0,0,0,0.25);
    border: 1px solid transparent;
    border-radius: var(--r-sm);
    cursor: pointer;
    transition: all var(--t-fast);
    font-size: 12px;
    color: var(--text-mid);
    text-align: right;
  }
  .demo-cred:hover {
    background: rgba(0,0,0,0.4);
    border-color: var(--accent);
    color: var(--text-hi);
  }
  .demo-cred .u {
    font-family: var(--font-mono);
    color: var(--accent);
    font-weight: 700;
  }
  .demo-pass {
    margin-top: 10px;
    font-size: 11px;
    color: var(--text-mid);
    text-align: center;
  }
  .demo-pass code {
    background: rgba(0,0,0,0.3);
    padding: 2px 8px;
    border-radius: 4px;
    color: var(--accent);
    font-weight: 700;
  }

  /* Footer info */
  .footer-info {
    text-align: center;
    margin-top: 24px;
    color: var(--text-low);
    font-size: 11px;
    line-height: 1.8;
    letter-spacing: 0.05em;
  }
  .footer-info .badges {
    display: inline-flex;
    flex-wrap: wrap;
    gap: 4px;
    justify-content: center;
    margin-top: 6px;
  }
  .footer-info .badge {
    padding: 2px 8px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--r-pill);
    font-size: 10px;
    color: var(--text-mid);
    font-weight: 600;
  }

  /* Loading state */
  .btn--loading {
    pointer-events: none;
    opacity: 0.7;
  }

  @media (max-width: 480px) {
    .login-card { padding: 22px; }
    .demo-credentials { grid-template-columns: 1fr; }
  }
</style>
</head>
<body class="tactical-grid">
  <div class="login-shell">
    <div class="brand-block">
      <div class="brand-logo"></div>
      <h1 class="brand-title">מערכת שו״ב</h1>
      <p class="brand-subtitle">תנועת הצופים · Forest Operations</p>
    </div>

    <form class="login-card" id="login-form" autocomplete="off" novalidate>
      <h2>כניסה למערכת</h2>
      <p class="sub">הזן פרטי הזדהות כדי להמשיך</p>

      <div class="error-msg" id="error-msg" role="alert">
        <span>⚠</span>
        <span data-error-text></span>
      </div>

      <div class="form-field">
        <label for="username">שם משתמש</label>
        <div class="input-with-icon">
          <input class="input" type="text" name="username" id="username" required
                 autocomplete="username" placeholder="kabat, operator, guard..."
                 inputmode="latin">
          <span class="icon">👤</span>
        </div>
      </div>

      <div class="form-field">
        <label for="password">סיסמה</label>
        <div class="input-with-icon">
          <input class="input" type="password" name="password" id="password" required
                 autocomplete="current-password" placeholder="••••">
          <span class="icon">🔒</span>
        </div>
      </div>

      <div class="form-row">
        <label class="checkbox">
          <input type="checkbox" name="remember">
          <span>זכור אותי</span>
        </label>
        <a href="#" id="forgot">שכחתי סיסמה</a>
      </div>

      <button class="btn btn--primary btn--lg btn--block" type="submit" id="btn-submit">
        התחבר ←
      </button>

      <div class="demo-panel">
        <div class="demo-panel-title">🎬 גישת הדגמה — לחץ למילוי</div>
        <div class="demo-credentials" id="demo-creds"></div>
        <div class="demo-pass">הסיסמה לכל המשתמשים: <code>1234</code></div>
      </div>
    </form>

    <div class="footer-info">
      <div>גרסה 1.0 · Multi-Forest SSO · Encrypted In Transit</div>
      <div class="badges">
        <span class="badge">🔒 AES-256</span>
        <span class="badge">📡 Offline-Ready</span>
        <span class="badge">🎯 Tactical UI</span>
      </div>
    </div>
  </div>

<script src="shared/engine.js"></script>
<script>
(function () {
  'use strict';
  const { ScoutDB, UI, Toast, util, Auth } = Scout;

  // If already logged in, route to the user's home page
  if (Auth.isLoggedIn()) {
    const p = UI.currentPersona();
    location.replace(Auth.routeForRole(p.role));
    return;
  }

  // Render demo credentials list
  const demoUsers = Auth.listDemoUsers();
  document.getElementById('demo-creds').innerHTML = demoUsers.map(u => `
    <button type="button" class="demo-cred" data-user="${util.escapeHtml(u.user)}">
      <span class="u">${util.escapeHtml(u.user)}</span>
      <div style="font-size: 10px; margin-top: 2px;">${util.escapeHtml(u.roleLabel)}</div>
    </button>
  `).join('');

  document.getElementById('demo-creds').addEventListener('click', e => {
    const cred = e.target.closest('[data-user]');
    if (!cred) return;
    const uInput = document.getElementById('username');
    const pInput = document.getElementById('password');
    uInput.value = cred.dataset.user;
    pInput.value = '1234';
    uInput.classList.remove('is-invalid');
    pInput.classList.remove('is-invalid');
    hideError();
    pInput.focus();
  });

  document.getElementById('forgot').addEventListener('click', e => {
    e.preventDefault();
    Toast.show('יש לפנות לקב״ט המחנה לאיפוס סיסמה.', { kind: 'warn' });
  });

  // Error helpers
  const errEl = document.getElementById('error-msg');
  function showError(msg) {
    errEl.querySelector('[data-error-text]').textContent = msg;
    errEl.classList.add('is-active');
  }
  function hideError() {
    errEl.classList.remove('is-active');
  }

  // Submit handler
  document.getElementById('login-form').addEventListener('submit', e => {
    e.preventDefault();
    const f = e.target;
    const uInput = f.username;
    const pInput = f.password;
    const submitBtn = document.getElementById('btn-submit');

    const username = uInput.value.trim();
    const password = pInput.value;
    const remember = f.remember.checked;

    uInput.classList.remove('is-invalid');
    pInput.classList.remove('is-invalid');

    if (!username) { uInput.classList.add('is-invalid'); showError('יש להזין שם משתמש.'); uInput.focus(); return; }
    if (!password) { pInput.classList.add('is-invalid'); showError('יש להזין סיסמה.'); pInput.focus(); return; }

    // Visual feedback — simulated 350ms auth
    submitBtn.classList.add('btn--loading');
    submitBtn.textContent = 'מתחבר...';

    setTimeout(() => {
      const result = Auth.login(username, password);
      submitBtn.classList.remove('btn--loading');
      submitBtn.textContent = 'התחבר ←';

      if (!result.ok) {
        showError(result.error);
        if (/משתמש/.test(result.error)) uInput.classList.add('is-invalid');
        else pInput.classList.add('is-invalid');
        pInput.value = '';
        (result.error.includes('סיסמה') ? pInput : uInput).focus();
        return;
      }

      if (remember) ScoutDB.set('rememberMe', true);
      // Route to role's home
      location.replace(Auth.routeForRole(result.persona.role));
    }, 350);
  });

  // Auto-focus username
  document.getElementById('username').focus();
})();
</script>
</body>
</html>
